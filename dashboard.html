<title>Expanse Tracker</title>
<!-- Chart.js 제거 → 순수 Canvas로 교체 -->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0c1210;
    color: #e4e4f0;
    min-height: 100vh;
  }

  /* Header */
  header {
    background: linear-gradient(135deg, #0d1f17 0%, #111c18 100%);
    padding: 24px 32px;
    padding-top: calc(24px + env(safe-area-inset-top));
    padding-left: max(32px, env(safe-area-inset-left));
    padding-right: max(32px, env(safe-area-inset-right));
    border-bottom: 1px solid #1a3326;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.5px; display: flex; align-items: center; gap: 12px; }
  header h1 span { color: #10b981; }
  header h1 .brand-logo { width: 34px; height: 34px; flex-shrink: 0; display: block; }
  .header-right { font-size: 13px; color: #888; }

  /* Month Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 16px 32px;
    background: #0f1a13;
    border-bottom: 1px solid #1a2e22;
    overflow-x: auto;
  }
  .tab {
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    color: #aaa;
    background: transparent;
  }
  .tab:hover { background: #162318; color: #e4e4f0; }
  .tab.active {
    background: #10b981;
    color: #fff;
    border-color: #10b981;
  }

  /* Main Layout */
  .main { padding: 28px 32px; max-width: 1400px; }

  /* KPI Cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .kpi-card {
    background: #121a14;
    border: 1px solid #1e3028;
    border-radius: 14px;
    padding: 20px 22px;
    position: relative;
    overflow: hidden;
  }
  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 14px 14px 0 0;
  }
  .kpi-card.purple::before { background: linear-gradient(90deg, #10b981, #6ee7b7); }
  .kpi-card.green::before  { background: linear-gradient(90deg, #059669, #10b981); }
  .kpi-card.red::before    { background: linear-gradient(90deg, #f87171, #fca5a5); }
  .kpi-card.blue::before   { background: linear-gradient(90deg, #34d399, #6ee7b7); }
  .kpi-label { font-size: 12px; color: #888; font-weight: 500; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-value { font-size: 30px; font-weight: 800; color: #fff; letter-spacing: -1px; }
  .kpi-value.red-text { color: #f87171; }
  .kpi-value.green-text { color: #10b981; }
  .kpi-sub { font-size: 12px; color: #666; margin-top: 4px; }
  .kpi-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    margin-top: 6px;
  }
  .kpi-badge.up { background: rgba(16,185,129,0.15); color: #10b981; }
  .kpi-badge.down { background: rgba(248,113,113,0.15); color: #f87171; }

  /* ── KPI 프라이버시 마스크 (탭/클릭 토글) ── */
  .kpi-value {
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.18s ease;
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .kpi-value.masked {
    color: #555 !important;
    letter-spacing: 2px;
    font-family: monospace;
  }
  .kpi-value.masked::after {
    content: '\1F441';
    font-size: 14px;
    opacity: 0.5;
    letter-spacing: 0;
    margin-left: 4px;
  }
  .kpi-value:active { opacity: 0.6; }
  .kpi-card { position: relative; }
  .kpi-eye {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    color: #666;
    font-size: 11px;
    line-height: 22px;
    text-align: center;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.18s, color 0.18s;
  }
  .kpi-eye:hover { background: rgba(255,255,255,0.08); color: #aaa; }
  .kpi-eye.revealed { color: #10b981; background: rgba(16,185,129,0.12); }

  /* Charts Row */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  .chart-card {
    background: #121a14;
    border: 1px solid #1e3028;
    border-radius: 14px;
    padding: 22px;
  }
  .chart-title {
    font-size: 14px;
    font-weight: 600;
    color: #ccc;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .chart-title .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #10b981;
  }
  .chart-container { position: relative; }

  /* Bottom Row */
  .bottom-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .table-card {
    background: #121a14;
    border: 1px solid #1e3028;
    border-radius: 14px;
    padding: 22px;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left;
    padding: 8px 10px;
    color: #666;
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid #1e3028;
  }
  tbody tr { border-bottom: 1px solid #1a2c22; transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #162318; }
  tbody td { padding: 9px 10px; color: #ddd; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
  }
  .badge-purple { background: rgba(16,185,129,0.15); color: #6ee7b7; }
  .badge-green  { background: rgba(52,211,153,0.15); color: #6ee7b7; }
  .badge-blue   { background: rgba(96,165,250,0.15); color: #93c5fd; }
  .badge-orange { background: rgba(251,146,60,0.15); color: #fba040; }
  .badge-red    { background: rgba(248,113,113,0.15); color: #f87171; }
  .badge-acct   { background: rgba(255,255,255,0.04); color: #9aa4b6; border: 1px solid rgba(255,255,255,0.08); font-weight: 400; white-space: nowrap; }

  /* Tx 테이블 가로 스크롤 wrapper (모바일 안전망) */
  .tx-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tx-scroll::-webkit-scrollbar { height: 6px; }
  .tx-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
  .tx-table { min-width: 100%; }
  .tx-table th, .tx-table td { white-space: nowrap; }
  @media (max-width: 480px) {
    .tx-table th, .tx-table td { padding: 8px 6px; font-size: 12px; }
    .tx-table .badge { font-size: 10px; padding: 2px 6px; }
    .tx-table td[title] { max-width: 140px !important; }
  }

  /* Stacked + line chart legend */
  .stack-legend { display:flex; gap:14px; font-size:11px; color:#9aa4b6; font-weight:500; }
  .stack-leg-item { display:inline-flex; align-items:center; gap:6px; }
  .stack-leg-sw { width:10px; height:10px; border-radius:2px; display:inline-block; }
  .stack-leg-line {
    width:16px; height:2px; background:#10b981; position:relative; display:inline-block;
  }
  .stack-leg-line::before {
    content:''; position:absolute; left:50%; top:50%;
    width:6px; height:6px; background:#10b981;
    border-radius:50%; transform:translate(-50%,-50%);
  }

  /* Savings rate progress bar inside summary table */
  .pct-bar { display:inline-flex; align-items:center; gap:8px; justify-content:flex-end; }
  .pct-bar-track { width:64px; height:4px; background:rgba(255,255,255,0.06); border-radius:2px; overflow:hidden; }
  .pct-bar-fill  { height:100%; background:#34d399; border-radius:2px; }
  .pct-bar-fill.neg { background:#f87171; }
  .pct-bar-value { min-width:46px; text-align:right; font-variant-numeric:tabular-nums; font-size:12px; }

  /* Category bars */
  .cat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .cat-name { width: 90px; font-size: 12px; color: #aaa; flex-shrink: 0; }
  .cat-bar-wrap { flex: 1; height: 8px; background: #1e3028; border-radius: 4px; overflow: hidden; }
  .cat-bar { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
  .cat-amount { width: 75px; text-align: right; font-size: 12px; color: #ccc; flex-shrink: 0; }

  .savings-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #1e3028;
  }
  .savings-row:last-child { border-bottom: none; }
  .savings-label { font-size: 13px; color: #aaa; }
  .savings-value { font-size: 14px; font-weight: 600; color: #fff; }

  /* Full-width chart */
  .full-chart {
    margin-bottom: 24px;
  }

  /* 전체 탭 특별 스타일 */
  .tab-all {
    border: 1px solid #1e3028 !important;
    color: #6ee7b7 !important;
  }
  .tab-all.active {
    background: linear-gradient(135deg, #059669, #10b981) !important;
    color: #fff !important;
    border-color: #059669 !important;
  }

  /* 전체 뷰 요약 테이블 */
  .savings-positive { color: #10b981; font-weight: 600; }
  .savings-negative { color: #f87171; font-weight: 600; }
  .month-highlight { background: rgba(16,185,129,0.08) !important; }

  /* 차트 툴팁 */
  .chart-tooltip {
    position: fixed;
    background: rgba(8,15,10,0.97);
    border: 1px solid #2a4438;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: #e4e4f0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.14s ease;
    box-shadow: 0 8px 28px rgba(0,0,0,0.65), 0 0 0 1px rgba(16,185,129,0.08);
    max-width: 210px;
    min-width: 140px;
    line-height: 1.6;
  }
  .chart-tooltip.vis { opacity: 1; }
  .chart-tooltip .tt-header { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 7px; padding-bottom: 6px; border-bottom: 1px solid #1e3028; }
  .chart-tooltip .tt-row { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-top: 3px; }
  .chart-tooltip .tt-lhs  { display:flex; align-items:center; gap:5px; color:#888; }
  .chart-tooltip .tt-sw   { width:7px; height:7px; border-radius:2px; flex-shrink:0; }
  .chart-tooltip .tt-val  { font-weight:600; font-variant-numeric: tabular-nums; }

  /* 지출 내역 탭 */
  .tx-tabs { display:flex; gap:6px; }
  .tx-tab {
    padding: 4px 14px; border-radius: 6px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: 1px solid #1e3028; background: transparent; color: #888;
    transition: all 0.15s;
  }
  .tx-tab:hover { background: #162318; color: #e4e4f0; }
  .tx-tab.active { background: #10b981; color: #fff; border-color: #10b981; }

  /* ── 모바일 반응형 (iPhone 등 소형 화면) ── */
  @media (max-width: 768px) {
    header {
      padding: 16px 18px;
      padding-top: calc(16px + env(safe-area-inset-top));
      padding-left: max(18px, env(safe-area-inset-left));
      padding-right: max(18px, env(safe-area-inset-right));
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }
    header h1 { font-size: 18px; }
    .header-right { font-size: 11px; }

    .tabs {
      padding: 10px 14px;
      gap: 6px;
    }
    .tab { padding: 7px 14px; font-size: 13px; }

    .main { padding: 16px 14px; }

    /* KPI: 4열 → 2열 */
    .kpi-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .kpi-card { padding: 14px 14px; }
    .kpi-value { font-size: 22px; }
    .kpi-label { font-size: 11px; }

    /* 차트 섹션: 2열 → 1열 */
    .charts-row { grid-template-columns: 1fr; gap: 12px; }
    .bottom-row  { grid-template-columns: 1fr; gap: 12px; }

    .chart-card  { padding: 16px 14px; }
    .table-card  { padding: 16px 14px; }

    /* 카테고리 바 이름 너비 축소 */
    .cat-name { width: 72px; font-size: 11px; }
    .cat-amount { width: 60px; font-size: 11px; }

    /* 테이블 폰트 축소 */
    table { font-size: 12px; }
    thead th { font-size: 10px; padding: 6px 6px; }
    tbody td  { padding: 7px 6px; }

    /* 거래 내역 탭 버튼 */
    .tx-tabs { flex-wrap: wrap; }
    .tx-tab { font-size: 11px; padding: 4px 10px; }
  }

  @media (max-width: 420px) {
    /* 아이폰 SE 등 초소형 */
    .kpi-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .kpi-value { font-size: 19px; }
    .main { padding: 12px 10px; }
  }

  /* ───────────────────────────────────────────────────────
   * 모바일 horizontal swipe deck
   * 데스크탑: 기존 grid 레이아웃 유지
   * 모바일:  카드 deck → 좌우 swipe + scroll-snap
   * ───────────────────────────────────────────────────────*/
  .cards-deck { position: relative; }
  .swipe-dots { display: none; }
  .swipe-page-label {
    display: none;
    text-align: center;
    font-size: 11px;
    color: #6b7280;
    letter-spacing: 0.4px;
    font-weight: 500;
    padding: 0 0 6px;
    height: 14px;
    line-height: 14px;
  }

  @media (max-width: 768px) {
    /* deck 자체가 수평 swipe 레인 — touch-action 은 기본(auto)로 두어
     * 짧은 카드에선 수평 swipe, 긴 카드 내부에선 수직 swipe가 각각
     * 자연스럽게 분리되도록 한다. (pan-x를 강제하면 카드 내부 수직 스크롤이 죽음) */
    .cards-deck {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      align-items: flex-start;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      overscroll-behavior-x: contain;    /* 수평만 contain, 수직은 페이지로 propagate 가능 */
      -webkit-overflow-scrolling: touch;
      gap: 12px;
      margin: 4px -14px 0;
      padding: 4px 14px 14px;
      scrollbar-width: none;
      will-change: scroll-position, height;
      transition: height 0.28s ease;
    }
    .cards-deck::-webkit-scrollbar { display: none; }

    /* 기존 row 래퍼를 투명화 → 카드가 deck의 직속 flex item이 됨 */
    .charts-row,
    .bottom-row { display: contents; }

    /* 카드 폭 = viewport. 높이는 콘텐츠가 결정하되 viewport-cap.
     * max-height 초과 시 카드 내부에서 vertical scroll → 페이지가 viewport 안에 들어와
     * 수평/수직 swipe가 자연스럽게 구분됨. */
    .cards-deck .chart-card,
    .cards-deck .table-card {
      flex: 0 0 calc(100vw - 40px);
      max-width: calc(100vw - 40px);
      align-self: flex-start;
      scroll-snap-align: center;
      scroll-snap-stop: always;
      margin: 0 !important;
      max-height: calc(100vh - 220px);
      max-height: calc(100dvh - 220px);  /* iOS 15.4+ — 주소창 fold 대응 */
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;       /* 카드 내부 스크롤 끝에서 페이지로 chain 차단 */
      box-shadow: 0 2px 8px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.02);
      transform: translateZ(0);
    }
    .cards-deck .full-chart { margin-bottom: 0 !important; }

    /* 차트 캔버스 가독성 — 모바일에서는 더 큰 높이 */
    .cards-deck .chart-card .chart-container {
      height: 240px !important;
    }

    /* 카드 내부 scrollbar 스타일 — iOS에선 기본 숨김, Android Chrome 등 호환 */
    .cards-deck .chart-card::-webkit-scrollbar,
    .cards-deck .table-card::-webkit-scrollbar {
      width: 4px;
    }
    .cards-deck .chart-card::-webkit-scrollbar-thumb,
    .cards-deck .table-card::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
    }

    /* ── pagination dots ── */
    .swipe-dots {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      padding: 4px 14px 4px;
      margin: 0 0 6px;
      min-height: 18px;
    }
    .swipe-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #233028;
      transition: background 0.22s ease, width 0.22s ease;
      flex-shrink: 0;
      /* thumb-friendly hit target */
      position: relative;
    }
    .swipe-dot::before {
      content: '';
      position: absolute;
      inset: -10px;
    }
    .swipe-dot.active {
      width: 22px;
      border-radius: 3px;
      background: #10b981;
    }

    .swipe-page-label { display: block; }

    /* 탭 - thumb-friendly */
    .tab {
      padding: 9px 16px;
      font-size: 13px;
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      border-radius: 10px;
    }
    .tabs {
      padding: 10px 14px;
      gap: 6px;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
    }
    .tab { scroll-snap-align: start; }

    /* 거래 내역 탭 */
    .tx-tab { padding: 6px 14px; min-height: 30px; border-radius: 8px; }
    .tx-tabs { gap: 8px; }

    /* safe area 패딩 (iPhone notch / home indicator 대응) */
    .tabs { padding-left: max(14px, env(safe-area-inset-left)); padding-right: max(14px, env(safe-area-inset-right)); }
    .main { padding-left: max(14px, env(safe-area-inset-left)); padding-right: max(14px, env(safe-area-inset-right)); padding-bottom: max(16px, env(safe-area-inset-bottom)); }
  }

  @media (max-width: 420px) {
    .cards-deck .chart-card,
    .cards-deck .table-card {
      flex: 0 0 calc(100vw - 32px);
      max-width: calc(100vw - 32px);
    }
  }

  /* ── 툴팁 모바일 close 버튼 (터치 디바이스 전용) ── */
  .chart-tooltip .tt-close {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    color: #aaa;
    font-size: 16px;
    line-height: 22px;
    text-align: center;
    cursor: pointer;
    display: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  @media (hover: none) and (pointer: coarse) {
    .chart-tooltip {
      pointer-events: auto;
      padding-right: 32px;
      max-width: 240px;
    }
    .chart-tooltip .tt-close { display: block; }
    /* 터치 환경에서는 cursor crosshair 제거 */
    canvas { cursor: default !important; }
  }

  /* ═══════════════════════════════════════════════════
     플로팅 + 버튼 (FAB) + 거래 입력 모달
     ═══════════════════════════════════════════════════ */
  .fab {
    position: fixed;
    right: 20px;
    bottom: 20px;
    bottom: calc(20px + env(safe-area-inset-bottom));
    width: 60px; height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #10b981, #059669);
    color: #fff; border: none;
    font-size: 32px; font-weight: 300; line-height: 1;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(16,185,129,0.4), 0 2px 6px rgba(0,0,0,0.3);
    z-index: 998;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
    -webkit-tap-highlight-color: transparent; user-select: none;
  }
  .fab:hover { transform: scale(1.05); box-shadow: 0 8px 26px rgba(16,185,129,0.55), 0 2px 8px rgba(0,0,0,0.35); }
  .fab:active { transform: scale(0.95); }
  .inp-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    z-index: 1000; display: none;
    align-items: flex-end; justify-content: center;
    opacity: 0; transition: opacity 0.22s ease;
  }
  .inp-backdrop.show { opacity: 1; }
  .inp-backdrop.open { display: flex; }
  .inp-sheet {
    width: 100%; max-width: 480px;
    max-height: 92vh; max-height: 92dvh;
    background: #0c1210;
    border-radius: 20px 20px 0 0;
    overflow: hidden;
    display: flex; flex-direction: column;
    transform: translateY(20px);
    transition: transform 0.28s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
  }
  .inp-backdrop.show .inp-sheet { transform: translateY(0); }
  @media (min-width: 769px) {
    .inp-backdrop { align-items: center; }
    .inp-sheet { border-radius: 20px; max-height: 90vh; }
  }
  .inp-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; gap: 10px;
    background: #111a13; border-bottom: 1px solid #1e3028;
    flex-shrink: 0;
  }
  .inp-logo { font-size: 15px; font-weight: 700; color: #10b981; display: flex; align-items: center; gap: 8px; }
  .inp-logo svg { width: 20px; height: 20px; flex-shrink: 0; }
  .inp-type-toggle { display: flex; background: #0f1a13; border-radius: 10px; padding: 3px; border: 1px solid #1e3028; }
  .inp-type-btn {
    padding: 6px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
    border: none; cursor: pointer; background: transparent; color: #888;
    transition: all 0.2s; font-family: inherit;
  }
  .inp-type-btn.active { background: #10b981; color: #fff; }
  .inp-close-x {
    width: 36px; height: 36px; border-radius: 10px;
    background: #1a2e22; border: 1px solid #1e3028;
    color: #e4e4f0; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent; font-family: inherit;
  }
  .inp-body { overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; }
  .inp-amount-row {
    display: flex; align-items: center; justify-content: center;
    padding: 20px 24px 12px; gap: 12px; background: #111a13;
  }
  .inp-amount-prefix { font-size: 36px; font-weight: 800; color: #10b981; line-height: 1; }
  .inp-amount-input {
    font-size: 40px; font-weight: 800; color: #fff;
    background: transparent; border: none; outline: none;
    width: 0; flex: 1; text-align: left;
    caret-color: #10b981; font-family: inherit;
  }
  .inp-amount-input::placeholder { color: #333; }
  .inp-camera-btn {
    width: 44px; height: 44px; border-radius: 12px;
    background: #1a2e22; border: 1px solid #1e3028;
    font-size: 20px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .inp-section-label {
    font-size: 11px; font-weight: 600; color: #888;
    text-transform: uppercase; letter-spacing: 0.6px;
    padding: 10px 20px 6px;
  }

<script>
// ── Google Sheets 실시간 연동 설정 ─────────────────────────
// sync_to_gsheets.py 실행 후 자동으로 채워집니다.
// 직접 입력하려면: Google Sheets URL에서 /d/ 다음 부분을 복사
const GSHEET_ID = '1yQezCSU6RioQIm-9W7eszwj1K3vM_xvNVdVjNrxA-eQ';  // 예: '1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms'

// CSV 파싱 헬퍼 (쉼표·따옴표 처리)
function parseCSV(text) {
  const rows = [], lines = text.split('\n');
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = [], re = /("(?:[^"]|"")*"|[^,]*)(,|$)/g;
    let m;
    while ((m = re.exec(line)) !== null) {
      let v = m[1];
      if (v.startsWith('"') && v.endsWith('"')) v = v.slice(1, -1).replace(/""/g, '"');
      cols.push(v);
      if (m[2] === '') break;
    }
    rows.push(cols);
  }
  return rows;
}

// Google Sheets에서 DATA + VTX 불러오기
async function loadFromGoogleSheets() {
  if (!GSHEET_ID) return false;
  const base = `https://docs.google.com/spreadsheets/d/${GSHEET_ID}/export?format=csv&sheet=`;
  try {
    const [dataRes, vtxRes, fixedRes] = await Promise.all([
      fetch(base + 'DATA'),
      fetch(base + 'VTX'),
      fetch(base + 'FIXED'),
    ]);
    if (!dataRes.ok || !vtxRes.ok) return false;

    // DATA 시트 파싱
    const dataRows = parseCSV(await dataRes.text());
    const dHeader = dataRows[0];
    const newDATA = dataRows.slice(1).map(row => {
      const obj = {};
      dHeader.forEach((h, i) => obj[h] = row[i] || '');
      return {
        month:         obj.month,
        total_wealth:  parseFloat(obj.total_wealth)  || 0,
        bank_balance:  parseFloat(obj.bank_balance)  || 0,
        savings:       parseFloat(obj.savings)        || 0,
        stocks:        parseFloat(obj.stocks)         || 0,
        income:        parseFloat(obj.income)         || 0,
        total_expense: parseFloat(obj.total_expense)  || 0,
        categories:    obj.categories  ? JSON.parse(obj.categories)  : {},
        accounts:      obj.accounts    ? JSON.parse(obj.accounts)    : [],
        fixed_tx:      obj.fixed_tx    ? JSON.parse(obj.fixed_tx)    : [],
      };
    }).filter(d => d.month);

    // VTX 시트 파싱
    const vtxRows = parseCSV(await vtxRes.text());
    const vHeader = vtxRows[0];
    const newVTX = {};
    vtxRows.slice(1).forEach(row => {
      const obj = {};
      vHeader.forEach((h, i) => obj[h] = row[i] || '');
      if (!obj.month) return;
      if (!newVTX[obj.month]) newVTX[obj.month] = [];
      newVTX[obj.month].push({
        date:     obj.date,
        category: obj.category,
        desc:     obj.desc,
        account:  obj.account,
        amount:   parseFloat(obj.amount) || 0,
      });
    });

    // FIXED 시트 파싱 (있으면)
    if (fixedRes.ok) {
      const fRows = parseCSV(await fixedRes.text());
      const fHeader = fRows[0];
      const fixedByMonth = {};
      fRows.slice(1).forEach(row => {
        const obj = {};
        fHeader.forEach((h, i) => obj[h] = row[i] || '');
        if (!obj.month) return;
        if (!fixedByMonth[obj.month]) fixedByMonth[obj.month] = [];
        fixedByMonth[obj.month].push({
          date: obj.date, category: obj.category,
          sub: obj.subcategory || '', desc: obj.desc,
          account: obj.account, amount: parseFloat(obj.amount) || 0,
        });
      });
      newDATA.forEach(d => { d.fixed_tx = fixedByMonth[d.month] || []; });
    }

    // 데이터가 비어있으면 내장 데이터 유지 (CORS 등으로 빈 응답이 온 경우)
    if (newDATA.length === 0) {
      console.warn('[GSheets] 빈 데이터 수신 — 내장 데이터 유지');
      return false;
    }

    // 전역 DATA/VTX 교체
    DATA.length = 0;
    newDATA.forEach(d => DATA.push(d));
    Object.keys(VTX).forEach(k => delete VTX[k]);
    Object.assign(VTX, newVTX);
    console.log(`[GSheets] ${DATA.length}개월 로드 완료`);

    // 헤더 업데이트 표시
    const hr = document.querySelector('.header-right');
    if (hr) hr.textContent = '실시간 • ' + hr.textContent;
    return true;
  } catch(e) {
    console.warn('[GSheets] 로드 실패, 내장 데이터 사용:', e.message);
    return false;
  }

const SPEND_ACCTS = ['Chase', 'Chase Sphire', 'Chase Marriott'];
const SAVE_ACCTS  = ['Robinhood', 'Webull', '401K', 'Roth IRA', 'Mortgage'];

// 수입/지출/저축 재계산
// - 수입: 입금 내역 Chase 계좌 합계 = Chase account income
// - 지출: 지출요약 총 = DATA에 원래 저장된 total_expense (그대로 유지)
// - 저축: Robinhood/IRA 등 저축계좌 순유입 (income - expense)
DATA.forEach(d => {
  // income: 입금 내역 Chase 합계 (이미 DATA에 올바르게 내장됨)
  // total_expense: 지출요약 총 (이미 DATA에 올바르게 내장됨)
  // savings_net: 저축계좌 순유입 계산
  const sv = d.accounts.filter(a => SAVE_ACCTS.includes(a.name));
  d.savings_net = sv.reduce((s, a) => s + (a.income - a.expense), 0);
  // living_expense: '저축/투자' 제외한 실생활 지출
  d.living_expense = d.total_expense - (d.categories['저축/투자'] || 0);
  // 고정/변동 합계 — Monthly Expense Structure 차트용
  d.fixed_expense    = (d.fixed_tx || []).reduce((s, t) => s + (t.amount || 0), 0);
  d.variable_expense = (d.var_tx   || []).reduce((s, t) => s + (t.amount || 0), 0);
});

function fmt(n) {
  if (n === null || n === undefined) return '-';
  const abs = Math.abs(n);
  const str = abs >= 1000 ? '$' + abs.toLocaleString('en', {minimumFractionDigits:0, maximumFractionDigits:0}) : '$' + abs.toFixed(2);
  return n < 0 ? '-' + str : str;
}

// ── 통합 월 파서 (chronological 정렬 전용) ────────────────────
// "1월", "01월", "2026년 1월", "2026-01", "01", "Jan", "January" 등 다양한 포맷 지원
// locale·date format 차이로 순서가 깨지지 않게 모든 차트가 이 한 함수만 사용
const _MONTH_NAMES = {
  jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12,
  january:1,february:2,march:3,april:4,june:6,july:7,august:8,
  september:9,october:10,november:11,december:12
};
function parseMonth(monthStr) {
  if (monthStr === null || monthStr === undefined) return 0;
  const s = String(monthStr).trim().toLowerCase();
  // "1월", "01월"
  let m = s.match(/(\d+)\s*월/);
  if (m) return parseInt(m[1], 10);
  // "2026-01", "2026/01", "2026.01"
  m = s.match(/\d{4}[-./](\d{1,2})/);
  if (m) return parseInt(m[1], 10);
  // English month names
  const namePart = s.replace(/[^a-z]/g, '');
  if (namePart && _MONTH_NAMES[namePart]) return _MONTH_NAMES[namePart];
  // 단순 숫자 ("01", "1", "12")
  m = s.match(/^\s*(\d{1,2})\s*$/);
  if (m) return parseInt(m[1], 10);
  // 마지막 폴백: 첫 숫자
  m = s.match(/(\d+)/);
  return m ? parseInt(m[1], 10) : 0;
}
function sortByMonth(arr) {
  return [...arr].sort((a, b) => parseMonth(a.month) - parseMonth(b.month));
}

// ── KPI 프라이버시 마스크 ────────────────────────────
// 기본 상태: 모든 KPI 값이 가려짐. 해당 카드 탭/클릭 시 토글.
// 어떤 카드가 공개되었는지 메모리에 유지하여 월 전환·재렌더 후에도 사용자 선택 유지.
const KPI_KEYS = ['wealth', 'income', 'expense', 'savings'];
const _kpiRevealed = {};
KPI_KEYS.forEach(k => _kpiRevealed[k] = false);

const KPI_MASK = '$' + '•'.repeat(5);

function _kpiVal(key, realText, extraClass) {
  const revealed = _kpiRevealed[key];
  const cls = 'kpi-value' + (extraClass ? ' ' + extraClass : '') + (revealed ? '' : ' masked');
  const shown = revealed ? realText : KPI_MASK;
  return `<div class="${cls}" data-kpi="${key}" aria-label="${revealed ? '숨기기' : '금액 보기'}">${shown}</div>`;
}

function _kpiEye(key) {
  const revealed = _kpiRevealed[key];
  return `<div class="kpi-eye${revealed ? ' revealed' : ''}" data-kpi-eye="${key}" title="${revealed ? '숨기기' : '보기'}">${revealed ? '🙈' : '👁'}</div>`;
}

function toggleKpi(key) {
  if (!(key in _kpiRevealed)) return;
  _kpiRevealed[key] = !_kpiRevealed[key];
  // 현재 모드(월별/전체) 그대로 KPI만 다시 그리도록
  const allBar = document.getElementById('allMonthBarWrap');
  const isAll = allBar && allBar.style.display !== 'none';
  if (isAll) renderAllKPI(); else renderKPI(currentMonth);
}

// 위임된 클릭 핸들러 (kpiGrid 한 번만 등록)
document.addEventListener('DOMContentLoaded', () => {
  const grid = document.getElementById('kpiGrid');
  if (!grid) return;
  grid.addEventListener('click', e => {
    const eye = e.target.closest('[data-kpi-eye]');
    const val = e.target.closest('[data-kpi]');
    const key = (eye && eye.dataset.kpiEye) || (val && val.dataset.kpi);
    if (!key) return;
    toggleKpi(key);
  });
});

function renderKPI(idx) {
  const d = DATA[idx];
  const prev = idx > 0 ? DATA[idx-1] : null;
  const wealthDiff = prev ? d.total_wealth - prev.total_wealth : 0;
  const wealthPct = prev ? ((wealthDiff / prev.total_wealth) * 100).toFixed(1) : 0;
  const sn = d.savings_net;
  const rev = _kpiRevealed;

  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card purple">
      ${_kpiEye('wealth')}
      <div class="kpi-label">총 재산</div>
      ${_kpiVal('wealth', fmt(d.total_wealth))}
      ${prev && rev.wealth ? `<div class="kpi-badge ${wealthDiff >= 0 ? 'up' : 'down'}">${wealthDiff >= 0 ? '▲' : '▼'} ${fmt(Math.abs(wealthDiff))} (${Math.abs(wealthPct)}%)</div>` : ''}
    </div>
    <div class="kpi-card green">
      ${_kpiEye('income')}
      <div class="kpi-label">총 수입</div>
      ${_kpiVal('income', fmt(d.income), 'green-text')}
      <div class="kpi-sub">Chase 3계좌 입금</div>
    </div>
    <div class="kpi-card red">
      ${_kpiEye('expense')}
      <div class="kpi-label">생활 지출</div>
      ${_kpiVal('expense', fmt(d.living_expense), 'red-text')}
      <div class="kpi-sub">저축/투자 제외 실지출</div>
    </div>
    <div class="kpi-card blue">
      ${_kpiEye('savings')}
      <div class="kpi-label">저축 순유입</div>
      ${_kpiVal('savings', fmt(sn), sn >= 0 ? 'green-text' : 'red-text')}
      <div class="kpi-sub">투자·저축 계좌 순변동</div>
    </div>
  `;
}

// roundRect 폴리필 (구형 브라우저 대비)
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    const rad = Array.isArray(r) ? r[0] : r;
    this.moveTo(x + rad, y);
    this.lineTo(x + w - rad, y); this.quadraticCurveTo(x+w, y, x+w, y+rad);
    this.lineTo(x + w, y + h - rad); this.quadraticCurveTo(x+w, y+h, x+w-rad, y+h);
    this.lineTo(x + rad, y + h); this.quadraticCurveTo(x, y+h, x, y+h-rad);
    this.lineTo(x, y + rad); this.quadraticCurveTo(x, y, x+rad, y);
    this.closePath();
  };
}

// ── 순수 Canvas 차트 유틸 ──────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}
// ── DPR 적용 캔버스 셋업 ─────────────────────────────────
// HiDPI 디스플레이에서 텍스트·라인이 sharp하게 보이도록 backing store는
// 네이티브 픽셀(cssW * dpr) 크기로, CSS 표시는 cssW로 분리. setTransform으로
// drawing 명령은 CSS 픽셀 단위로 받음.
function setupCanvas(id) {
  const canvas = document.getElementById(id);
  const parent = canvas.parentElement;
  const dpr  = Math.min(window.devicePixelRatio || 1, 3); // 3배까지만 (메모리 보호)
  const cssW = parent.offsetWidth  || 500;
  const cssH = parent.offsetHeight || 220;
  // backing store = native pixels
  canvas.width  = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  // 표시 크기 = CSS pixels
  canvas.style.width  = cssW + 'px';
  canvas.style.height = cssH + 'px';
  // 차트·hit-test에서 사용
  canvas._cssW = cssW;
  canvas._cssH = cssH;
  canvas._dpr  = dpr;
  const ctx = canvas.getContext('2d');
  // 이후 모든 drawing 명령은 CSS 픽셀로 받음 → 자동으로 dpr 배율 native 픽셀에 그려짐
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return ctx;
}

// ── 툴팁 HTML 빌더 (통일 스타일) ──────────────────────────
function _ttHtml(title, rows) {
  const rowsHtml = rows.map(r =>
    `<div class="tt-row"><span class="tt-lhs"><span class="tt-sw" style="background:${r.color||'#888'}"></span>${r.label}</span><span class="tt-val" style="color:${r.color||'#ccc'}">${r.val}</span></div>`
  ).join('');
  return `<button class="tt-close" id="ttCloseBtn">×</button><div class="tt-header">${title}</div>${rowsHtml}`;
}

// ── 툴팁 & 호버 인터랙션 시스템 ─────────────────────────────
const _tt = document.getElementById('chartTooltip');
const _hz = {};          // canvasId → [{x,y,w,h,html}]
const _pz = {};          // canvasId → {cx,cy,outerR,innerR,slices:[{s,e,html}]}
const _snap = {};        // canvasId → ImageData (렌더 후 스냅샷)
const _pieAngles = {};   // canvasId → [{rawStart, sweep, color}]
let _ttPinned = false;   // 모바일: 탭으로 고정된 툴팁 여부
let _ttPinnedId = null;  // 고정된 canvasId
let _ttPinnedIdx = -1;   // 고정된 hit.idx

// 툴팁 닫기 (close 버튼 & 외부 탭용)
function _ttDismiss(id) {
  _ttPinned = false; _ttPinnedId = null; _ttPinnedIdx = -1;
  _tt.classList.remove('vis');
  if (id && _snap[id]) document.getElementById(id)?.getContext('2d').putImageData(_snap[id], 0, 0);
}
// close 버튼 이벤트 위임 (innerHTML이 바뀌어도 항상 동작)
_tt.addEventListener('click', e => {
  if (e.target && e.target.id === 'ttCloseBtn') _ttDismiss(_ttPinnedId);
});

function _setHz(id, zones) { _hz[id] = zones; }
function _setPz(id, data)  { _pz[id] = data; }

function _normAngle(a) { return ((a % (Math.PI*2)) + Math.PI*2) % (Math.PI*2); }

// 렌더 후 스냅샷 저장 → 호버 하이라이트 복원용
function _saveSnap(id) {
  const cvs = document.getElementById(id);
  if (!cvs) return;
  _snap[id] = cvs.getContext('2d').getImageData(0, 0, cvs.width, cvs.height);
  cvs._prevBar = -1;
}

// ── 캔버스에서 mx,my 좌표로 hit-test → {idx, html} 반환 (없으면 null) ──
function _hitTest(cvs, id, mx, my) {
  // 파이 도넛
  const pz = _pz[id];
  if (pz) {
    const dx = mx - pz.cx, dy = my - pz.cy, dist = Math.sqrt(dx*dx + dy*dy);
    if (dist <= pz.outerR && dist >= pz.innerR) {
      const ang = _normAngle(Math.atan2(dy, dx) + Math.PI/2);
      for (let si = 0; si < pz.slices.length; si++) {
        const s = pz.slices[si];
        if (s.s <= s.e ? (ang>=s.s && ang<s.e) : (ang>=s.s || ang<s.e)) {
          return {kind:'pie', idx:si, html:s.html};
        }
      }
    }
  }
  // 바 차트 zones
  const zones = _hz[id] || [];
  for (let zi = 0; zi < zones.length; zi++) {
    const z = zones[zi];
    if (mx>=z.x && mx<=z.x+z.w && my>=z.y && my<=z.y+z.h) {
      return {kind:'bar', idx:zi, html:z.html};
    }
  }
  return null;
}

// 파이 하이라이트 그리기 (mousemove + touch 공용)
function _drawPieHighlight(cvs, id, idx) {
  const ctx2 = cvs.getContext('2d');
  if (_snap[id]) ctx2.putImageData(_snap[id], 0, 0);
  const pz = _pz[id];
  if (!pz) return;
  const ad = (_pieAngles[id] || [])[idx];
  if (!ad) return;
  ctx2.save();
  ctx2.beginPath();
  ctx2.arc(pz.cx, pz.cy, pz.outerR + 5,
    ad.rawStart + 0.02, ad.rawStart + ad.sweep - 0.02);
  ctx2.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx2.lineWidth = 2;
  ctx2.shadowColor = ad.color;
  ctx2.shadowBlur = 10;
  ctx2.stroke();
  ctx2.restore();
}

// 바 하이라이트 그리기 (CSS 픽셀 기준 — ctx는 dpr scale 적용 상태)
function _drawBarHighlight(cvs, id, idx) {
  const ctx2 = cvs.getContext('2d');
  if (_snap[id]) ctx2.putImageData(_snap[id], 0, 0);
  const zones = _hz[id] || [];
  const z = zones[idx];
  if (!z) return;
  const cssH = cvs._cssH || cvs.height;
  ctx2.fillStyle = 'rgba(255,255,255,0.055)';
  ctx2.fillRect(z.x, 0, z.w, cssH);
}

// ── 캔버스 이벤트 등록 (hover/touch) ─────────────────────────────
function _regCanvasEvents(id) {
  const cvs = document.getElementById(id);
  if (!cvs || cvs._evRegistered) return;
  cvs._evRegistered = true;
  let lastIdx = -1;

  // 데스크탑 hover용 핸들러
  function handle(e) {
    const rect = cvs.getBoundingClientRect();
    let cx, cy;
    if (e.touches && e.touches.length) {
      cx = e.touches[0].clientX - rect.left;
      cy = e.touches[0].clientY - rect.top;
    } else {
      cx = e.clientX - rect.left;
      cy = e.clientY - rect.top;
    }
    const hit = _hitTest(cvs, id, cx, cy);
    if (hit) {
      if (hit.idx !== lastIdx) {
        lastIdx = hit.idx;
        if (hit.kind === 'pie') _drawPieHighlight(cvs, id, hit.idx);
        else _drawBarHighlight(cvs, id, hit.idx);
      }
      _tt.innerHTML = hit.html;
      _tt.classList.add('vis');
      const ttW = 220;
      let tx = e.clientX + 14, ty = e.clientY - 40;
      if (tx + ttW > window.innerWidth) tx = e.clientX - ttW - 14;
      if (ty < 0) ty = 10;
      _tt.style.left = tx + 'px';
      _tt.style.top  = ty + 'px';
    } else {
      if (lastIdx !== -1) {
        lastIdx = -1;
        if (_snap[id]) cvs.getContext('2d').putImageData(_snap[id], 0, 0);
      }
      _tt.classList.remove('vis');
    }
  }

  // 모바일 탭: touchstart로 시작 좌표 기록, touchend에서 탭 판정
  let _tStartX = 0, _tStartY = 0;

  cvs.addEventListener('touchstart', e => {
    _tStartX = e.touches[0].clientX;
    _tStartY = e.touches[0].clientY;
  }, {passive: true}); // passive: 스와이프 스크롤 방해 안 함

  cvs.addEventListener('touchend', e => {
    const t = e.changedTouches[0];
    // 10px 이상 움직이면 스와이프 → 무시
    if (Math.abs(t.clientX - _tStartX) > 10 || Math.abs(t.clientY - _tStartY) > 10) return;

    const rect = cvs.getBoundingClientRect();
    const cx = t.clientX - rect.left;
    const cy = t.clientY - rect.top;
    const hit = _hitTest(cvs, id, cx, cy);

    if (!hit) {
      if (_ttPinned) _ttDismiss(id);
      return;
    }

    // 같은 항목 재탭 → 닫기 (토글)
    if (_ttPinned && _ttPinnedId === id && _ttPinnedIdx === hit.idx) {
      _ttDismiss(id);
      lastIdx = -1;
      return;
    }

    // 다른 차트의 핀 해제
    if (_ttPinnedId && _ttPinnedId !== id && _snap[_ttPinnedId]) {
      document.getElementById(_ttPinnedId)?.getContext('2d').putImageData(_snap[_ttPinnedId], 0, 0);
    }

    // 새 항목 고정 표시
    lastIdx = hit.idx;
    _ttPinned = true; _ttPinnedId = id; _ttPinnedIdx = hit.idx;
    if (hit.kind === 'pie') _drawPieHighlight(cvs, id, hit.idx);
    else _drawBarHighlight(cvs, id, hit.idx);

    _tt.innerHTML = hit.html;
    _tt.classList.add('vis');

    // 툴팁 위치: position:fixed 이므로 viewport 좌표 사용
    const ttW = 240;
    let tx = t.clientX - ttW / 2;
    tx = Math.max(8, Math.min(tx, window.innerWidth - ttW - 8));
    // 탭 지점 위에 표시, 화면 위쪽 벗어나면 탭 지점 아래로
    let ty = t.clientY - 120;
    if (ty < 60) ty = t.clientY + 20;
    _tt.style.left = tx + 'px';
    _tt.style.top  = ty + 'px';
  }, {passive: true});

  cvs.addEventListener('mousemove', handle);
  cvs.addEventListener('mouseleave', () => {
    if (_ttPinned) return;
    lastIdx = -1;
    if (_snap[id]) cvs.getContext('2d').putImageData(_snap[id], 0, 0);
    _tt.classList.remove('vis');
  });
}

// ── 범용 막대 차트 ────────────────────────────────────────────────
function drawBarChart(id, labels, datasets, opts = {}) {
  const ctx = setupCanvas(id);
  const cvs = document.getElementById(id);
  const W = cvs._cssW, H = cvs._cssH;
  const pad = {top:28, right:16, bottom:36, left:54};
  const chartW = W - pad.left - pad.right;
  const chartH = H - pad.top - pad.bottom;
  const n = labels.length;
  const dsLen = datasets.length;
  if (n === 0) return;

  let maxV = 0, minV = 0;
  datasets.forEach(ds => ds.data.forEach(v => { if (v > maxV) maxV = v; if (v < minV) minV = v; }));
  if (maxV === 0 && minV === 0) maxV = 1;
  const span = maxV - minV || 1;
  const yBase = pad.top + chartH - (-minV / span) * chartH;

  // Grid
  const gridN = 4;
  for (let g = 0; g <= gridN; g++) {
    const v = minV + span * g / gridN;
    const y = pad.top + (1 - (v - minV) / span) * chartH;
    ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + chartW, y); ctx.stroke();
    ctx.fillStyle = '#666'; ctx.font = '10px -apple-system,sans-serif'; ctx.textAlign = 'right';
    const lbl = Math.abs(v) >= 1000 ? '$' + (v/1000).toFixed(1)+'k' : '$' + Math.round(v);
    ctx.fillText(lbl, pad.left - 4, y + 4);
  }

  const groupW = chartW / n;
  const barGap = 3;
  const barW = Math.max(5, (groupW - barGap * 2) / dsLen - barGap);
  const zones = [];

  datasets.forEach((ds, di) => {
    ds.data.forEach((v, i) => {
      if (v === null || v === undefined) return;
      const color = Array.isArray(ds.color) ? ds.color[i] : (ds.color || '#10b981');
      const rgb = hexToRgb(color);
      const barH = Math.abs(v) / span * chartH;
      const x = pad.left + i * groupW + barGap + di * (barW + barGap);
      const y = v >= 0 ? yBase - barH : yBase;
      const grad = ctx.createLinearGradient(x, y, x, y + barH);
      grad.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},0.92)`);
      grad.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0.5)`);
      ctx.beginPath(); ctx.roundRect(x, y, barW, Math.max(2, barH), 3);
      ctx.fillStyle = grad; ctx.fill();

      const zoneX = pad.left + i * groupW;
      zones.push({
        x: zoneX, y: pad.top, w: groupW, h: chartH,
        html: _ttHtml(labels[i], datasets.map(d2 => ({
          color: Array.isArray(d2.color) ? d2.color[i] : d2.color,
          label: d2.label,
          val: d2.data[i] !== undefined ? fmt(d2.data[i]) : '-'
        })))
      });
    });
  });

  // Deduplicate zones by x
  const seen = new Set();
  const uniqueZones = zones.filter(z => { const k = z.x; if (seen.has(k)) return false; seen.add(k); return true; });

  // Zero line
  if (minV < 0 && maxV > 0) {
    ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, yBase); ctx.lineTo(pad.left + chartW, yBase); ctx.stroke();
  }

  // X labels
  ctx.fillStyle = '#888'; ctx.font = '11px -apple-system,sans-serif'; ctx.textAlign = 'center';
  labels.forEach((lbl, i) => { ctx.fillText(lbl, pad.left + i * groupW + groupW / 2, H - 8); });

  _setHz(id, uniqueZones);
  _saveSnap(id);
  _regCanvasEvents(id);
}

// ── Stacked Bar + Line 차트 (Monthly Expense Structure 전용) ─────
// stackDatasets: [{label, data:[], color:'#hex'}, ...]  → 위쪽으로 쌓임
// lineDataset:   {label, data:[], color:'#hex'}         → 오버레이 라인
function drawStackedBarLineChart(id, labels, stackDatasets, lineDataset, opts = {}) {
  const ctx = setupCanvas(id);
  const cvs = document.getElementById(id);
  const W = cvs._cssW, H = cvs._cssH;
  const pad = {top: 32, right: 18, bottom: 36, left: 54};
  const chartW = W - pad.left - pad.right;
  const chartH = H - pad.top - pad.bottom;
  const n = labels.length;
  if (n === 0) return;

  // y-axis: 0 부터 max(stack-sum, line) 까지
  let maxV = 0;
  for (let i = 0; i < n; i++) {
    const stackSum = stackDatasets.reduce((s, ds) => s + (ds.data[i] || 0), 0);
    const lineV    = lineDataset.data[i] || 0;
    if (stackSum > maxV) maxV = stackSum;
    if (lineV    > maxV) maxV = lineV;
  }
  if (maxV === 0) maxV = 1;
  // headroom 10%
  maxV = maxV * 1.1;

  // Gridlines
  const gridN = 4;
  ctx.font = '10px -apple-system,sans-serif';
  ctx.textAlign = 'right';
  for (let g = 0; g <= gridN; g++) {
    const v = maxV * g / gridN;
    const y = pad.top + (1 - v / maxV) * chartH;
    ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + chartW, y); ctx.stroke();
    ctx.fillStyle = '#666';
    const lbl = v >= 1000 ? '$' + (v/1000).toFixed(0)+'k' : '$' + Math.round(v);
    ctx.fillText(lbl, pad.left - 6, y + 4);
  }

  const groupW = chartW / n;
  const barW = Math.min(48, groupW * 0.55);
  const zones = [];

  // Bars (stacked, 아래에서 위로)
  for (let i = 0; i < n; i++) {
    const xCenter = pad.left + i * groupW + groupW / 2;
    const xLeft   = xCenter - barW / 2;
    let yTop = pad.top + chartH;
    const segCount = stackDatasets.length;
    stackDatasets.forEach((ds, di) => {
      const v = ds.data[i] || 0;
      if (v <= 0) return;
      const h = (v / maxV) * chartH;
      const yNew = yTop - h;
      const rgb = hexToRgb(ds.color);
      const grad = ctx.createLinearGradient(xLeft, yNew, xLeft, yNew + h);
      grad.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},0.95)`);
      grad.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0.65)`);
      const isTop    = di === segCount - 1;
      const isBottom = di === 0;
      const rTop = isTop ? 5 : 0;
      const rBot = isBottom ? 5 : 0;
      ctx.beginPath();
      ctx.roundRect(xLeft, yNew, barW, Math.max(2, h), [rTop, rTop, rBot, rBot]);
      ctx.fillStyle = grad; ctx.fill();
      yTop = yNew;
    });

    // Tooltip zone
    const stackSum = stackDatasets.reduce((s, ds) => s + (ds.data[i] || 0), 0);
    const inc      = lineDataset.data[i] || 0;
    const net      = inc - stackSum;
    const cov      = stackSum > 0 ? (inc / stackSum * 100) : 0;
    const ttRows = [
      ...stackDatasets.map(ds => ({color: ds.color, label: ds.label, val: fmt(ds.data[i] || 0)})),
      {color: lineDataset.color, label: lineDataset.label, val: fmt(inc)},
      {color: '#6ee7b7', label: '순저축',  val: (net >= 0 ? '+' : '') + fmt(net)},
      {color: '#fbbf24', label: 'Coverage', val: cov.toFixed(0) + '%'}
    ];
    zones.push({
      x: pad.left + i * groupW, y: pad.top,
      w: groupW, h: chartH,
      html: _ttHtml(labels[i], ttRows)
    });
  }

  // Line overlay (수입)
  const linePts = [];
  for (let i = 0; i < n; i++) {
    const v = lineDataset.data[i] || 0;
    const x = pad.left + i * groupW + groupW / 2;
    const y = pad.top + (1 - v / maxV) * chartH;
    linePts.push({x, y, v});
  }
  // 라인
  ctx.strokeStyle = lineDataset.color;
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.beginPath();
  linePts.forEach((p, i) => {
    if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
  });
  ctx.stroke();
  // 포인트
  linePts.forEach(p => {
    ctx.beginPath(); ctx.arc(p.x, p.y, 4.5, 0, Math.PI * 2);
    ctx.fillStyle = '#0d1117'; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = lineDataset.color; ctx.stroke();
  });

  // X labels
  ctx.fillStyle = '#888'; ctx.font = '11px -apple-system,sans-serif'; ctx.textAlign = 'center';
  labels.forEach((lbl, i) => { ctx.fillText(lbl, pad.left + i * groupW + groupW / 2, H - 8); });

  _setHz(id, zones);
  _saveSnap(id);
  _regCanvasEvents(id);
}

// ── 범용 라인 차트 ────────────────────────────────────────────────
function drawLineChart(id, labels, datasets, opts = {}) {
  const ctx = setupCanvas(id);
  const cvs = document.getElementById(id);
  const W = cvs._cssW, H = cvs._cssH;
  const pad = {top:28, right:24, bottom:36, left:60};
  const chartW = W - pad.left - pad.right;
  const chartH = H - pad.top - pad.bottom;
  const n = labels.length;
  if (n === 0) return;

  let maxV = -Infinity, minV = Infinity;
  datasets.forEach(ds => ds.data.forEach(v => { if (v !== null && v !== undefined) { maxV = Math.max(maxV, v); minV = Math.min(minV, v); } }));
  if (!isFinite(maxV)) { maxV = 1; minV = 0; }
  if (maxV === minV) { maxV += 1; minV -= 1; }
  const padA = (maxV - minV) * 0.1;
  const realMax = maxV + padA, realMin = minV - padA;
  const realSpan = realMax - realMin;

  const xP = i => pad.left + (i / Math.max(n - 1, 1)) * chartW;
  const yP = v => pad.top + (1 - (v - realMin) / realSpan) * chartH;

  // Grid
  const gridN = 4;
  for (let g = 0; g <= gridN; g++) {
    const v = realMin + realSpan * g / gridN;
    const y = yP(v);
    ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + chartW, y); ctx.stroke();
    ctx.fillStyle = '#666'; ctx.font = '10px -apple-system,sans-serif'; ctx.textAlign = 'right';
    const lbl = Math.abs(v) >= 1000 ? '$' + (v/1000).toFixed(0)+'k' : '$'+Math.round(v);
    ctx.fillText(lbl, pad.left - 5, y + 4);
  }

  datasets.forEach(ds => {
    const color = ds.color || '#10b981';
    const rgb = hexToRgb(color);
    const pts = ds.data.map((v, i) => v !== null && v !== undefined ? {x: xP(i), y: yP(v)} : null);

    // Area
    if (opts.fill !== false && pts.some(p => p)) {
      const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + chartH);
      grad.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},0.2)`);
      grad.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0.0)`);
      ctx.beginPath();
      let first = true;
      pts.forEach((p, i) => {
        if (!p) return;
        if (first) { ctx.moveTo(p.x, pad.top + chartH); ctx.lineTo(p.x, p.y); first = false; }
        else ctx.lineTo(p.x, p.y);
      });
      const lastP = pts.filter(p => p).pop();
      if (lastP) { ctx.lineTo(lastP.x, pad.top + chartH); }
      ctx.closePath(); ctx.fillStyle = grad; ctx.fill();
    }

    // Line
    ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    let fl = true;
    pts.forEach(p => { if (!p) return; if (fl) { ctx.moveTo(p.x, p.y); fl = false; } else ctx.lineTo(p.x, p.y); });
    ctx.stroke();

    // Dots
    pts.forEach(p => {
      if (!p) return;
      ctx.beginPath(); ctx.arc(p.x, p.y, 3.5, 0, Math.PI*2);
      ctx.fillStyle = color; ctx.fill();
      ctx.strokeStyle = '#0c1210'; ctx.lineWidth = 1.5; ctx.stroke();
    });
  });

  // X labels
  ctx.fillStyle = '#888'; ctx.font = '11px -apple-system,sans-serif'; ctx.textAlign = 'center';
  labels.forEach((lbl, i) => ctx.fillText(lbl, xP(i), H - 8));

  // Hover zones
  const zones = labels.map((lbl, i) => {
    const halfW = n > 1 ? chartW / (n - 1) / 2 : chartW / 2;
    return {
      x: xP(i) - halfW, y: pad.top, w: halfW * 2, h: chartH,
      html: _ttHtml(lbl, datasets.map(ds => ({
        color: ds.color,
        label: ds.label,
        val: ds.data[i] !== null && ds.data[i] !== undefined ? fmt(ds.data[i]) : '-'
      })))
    };
  });
  _setHz(id, zones);
  _saveSnap(id);
  _regCanvasEvents(id);
}

// ── 도넛 차트 ────────────────────────────────────────────────────
function drawPieChart(id, slices, opts = {}) {
  const ctx = setupCanvas(id);
  const cvs = document.getElementById(id);
  const W = cvs._cssW, H = cvs._cssH;
  const cx = W / 2, cy = H / 2;
  const outerR = Math.min(W, H) * 0.37;
  const innerR = outerR * 0.56;
  const total = slices.reduce((s, sl) => s + (sl.value || 0), 0);
  if (total === 0) {
    ctx.fillStyle = '#555'; ctx.font = '13px -apple-system,sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('데이터 없음', cx, cy); return;
  }

  let angle = -Math.PI / 2;
  const pSlices = [], pAngles = [];

  slices.forEach(sl => {
    const sweep = (sl.value / total) * Math.PI * 2;
    const s = angle, e = angle + sweep;
    const color = sl.color || '#9ca3af';
    const rgb = hexToRgb(color);
    ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, outerR, s, e); ctx.closePath();
    const grad = ctx.createRadialGradient(cx, cy, innerR*0.5, cx, cy, outerR);
    grad.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},0.65)`);
    grad.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0.95)`);
    ctx.fillStyle = grad; ctx.fill();
    ctx.strokeStyle = '#0c1210'; ctx.lineWidth = 2; ctx.stroke();

    pSlices.push({
      s: _normAngle(s + Math.PI/2 + 0.02),
      e: _normAngle(e + Math.PI/2 - 0.02),
      html: _ttHtml(sl.label, [{color, label: sl.label, val: `${fmt(sl.value)} (${((sl.value/total)*100).toFixed(1)}%)`}])
    });
    pAngles.push({rawStart: s, sweep, color});
    angle += sweep;
  });

  // Hole
  ctx.beginPath(); ctx.arc(cx, cy, innerR, 0, Math.PI*2);
  ctx.fillStyle = '#0c1210'; ctx.fill();

  // Center text
  ctx.fillStyle = '#999'; ctx.font = '11px -apple-system,sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('생활지출', cx, cy - 7);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 13px -apple-system,sans-serif';
  ctx.fillText(fmt(total), cx, cy + 11);

  // Right legend if space, else bottom
  const legX = cx + outerR + 12;
  if (legX + 75 < W) {
    let ly = cy - slices.length * 9;
    slices.forEach(sl => {
      ctx.fillStyle = sl.color; ctx.fillRect(legX, ly - 5, 7, 7);
      ctx.fillStyle = '#aaa'; ctx.font = '10px -apple-system,sans-serif'; ctx.textAlign = 'left';
      ctx.fillText(`${sl.label} ${((sl.value/total)*100).toFixed(0)}%`, legX + 10, ly + 2);
      ly += 18;
    });
  } else {
    const colN = 3, colW = Math.floor(W / colN);
    slices.forEach((sl, si) => {
      const lx = (si % colN) * colW + 6;
      const ly = cy + outerR + 12 + Math.floor(si / colN) * 15;
      if (ly + 10 > H) return;
      ctx.fillStyle = sl.color; ctx.fillRect(lx, ly - 6, 6, 6);
      ctx.fillStyle = '#999'; ctx.font = '9px -apple-system,sans-serif'; ctx.textAlign = 'left';
      ctx.fillText(sl.label, lx + 9, ly);
    });
  }

  _setPz(id, {cx, cy, outerR, innerR, slices: pSlices});
  _pieAngles[id] = pAngles;
  _saveSnap(id);
  _regCanvasEvents(id);
}

// ── 카테고리 바 ───────────────────────────────────────────────────
const EXCL_CATS = new Set(['저축/투자']);
function renderCategoryBars(d) {
  const el = document.getElementById('categoryBars');
  if (!el) return;
  const cats = Object.entries(d.categories)
    .filter(([k, v]) => !EXCL_CATS.has(k) && v > 0)
    .sort((a, b) => b[1] - a[1]);
  const maxA = cats[0]?.[1] || 1;
  el.innerHTML = cats.map(([name, amt]) => {
    const pct = Math.max(4, (amt / maxA) * 100);
    const color = CAT_COLORS[name] || '#9ca3af';
    return `<div class="cat-row">
      <div class="cat-name">${name}</div>
      <div class="cat-bar-wrap"><div class="cat-bar" style="width:${pct.toFixed(1)}%;background:${color}"></div></div>
      <div class="cat-amount">${fmt(amt)}</div>
    </div>`;
  }).join('');
}

// ── 계좌 테이블 ───────────────────────────────────────────────────
function renderAccountTable(d) {
  const tbody = document.getElementById('accountTable');
  if (!tbody) return;
  const accts = d.accounts.filter(a => Math.abs(a.balance)+a.income+a.expense > 0);
  tbody.innerHTML = accts.map(a => {
    const balColor = a.balance >= 0 ? '#10b981' : '#f87171';
    const typeClass = SAVE_ACCTS.includes(a.name) ? 'badge-green' : 'badge-blue';
    return `<tr>
      <td><span class="badge ${typeClass}">${a.name}</span></td>
      <td style="color:${balColor};font-variant-numeric:tabular-nums">${fmt(a.balance)}</td>
      <td style="color:#10b981;font-variant-numeric:tabular-nums">${a.income > 0 ? '+'+fmt(a.income) : '-'}</td>
      <td style="color:#f87171;font-variant-numeric:tabular-nums">${a.expense > 0 ? fmt(a.expense) : '-'}</td>
    </tr>`;
  }).join('');
}

// ── 고정지출 테이블 ───────────────────────────────────────────────
function renderFixedTxTable(d) {
  const tbody = document.getElementById('txTable');
  if (!tbody) return;
  const rows = d.fixed_tx || [];
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="color:#555;text-align:center;padding:18px">고정지출 없음</td></tr>'; return;
  }
  tbody.innerHTML = rows.map(tx => {
    const color = CAT_COLORS[tx.category] || '#9ca3af';
    const rgb = hexToRgb(color);
    const chipBg = `rgba(${rgb.r},${rgb.g},${rgb.b},0.13)`;
    const amtCls = tx.amount < 0 ? '#10b981' : '#f87171';
    const acct   = tx.account || '-';
    return `<tr>
      <td style="color:#777;font-variant-numeric:tabular-nums;white-space:nowrap">${tx.date}</td>
      <td><span class="badge" style="background:${chipBg};color:${color}">${tx.category}</span></td>
      <td style="color:#ccc;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${tx.desc}">${tx.desc}</td>
      <td><span class="badge badge-acct">${acct}</span></td>
      <td style="color:${amtCls};text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap">${fmt(tx.amount)}</td>
    </tr>`;
  }).join('');
}

// ── 비고정지출 테이블 ─────────────────────────────────────────────
function renderVarTxTable(d) {
  const tbody = document.getElementById('varTxTable');
  if (!tbody) return;
  const rows = [...(d.var_tx || [])].sort((a,b) => a.date.localeCompare(b.date));
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="color:#555;text-align:center;padding:18px">비고정지출 없음</td></tr>'; return;
  }
  tbody.innerHTML = rows.map(tx => {
    const color = CAT_COLORS[tx.category] || '#9ca3af';
    const rgb = hexToRgb(color);
    const chipBg = `rgba(${rgb.r},${rgb.g},${rgb.b},0.13)`;
    const amtCls = tx.amount < 0 ? '#10b981' : '#f87171';
    const acct   = tx.account || '-';
    return `<tr>
      <td style="color:#777;font-variant-numeric:tabular-nums;white-space:nowrap">${tx.date}</td>
      <td><span class="badge" style="background:${chipBg};color:${color}">${tx.category}</span></td>
      <td style="color:#ccc;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${tx.desc}">${tx.desc}</td>
      <td><span class="badge badge-acct">${acct}</span></td>
      <td style="color:${amtCls};text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap">${fmt(tx.amount)}</td>
    </tr>`;
  }).join('');
}

// ── 전체 요약 테이블 ──────────────────────────────────────────────
function renderAllSummaryTable() {
  const tbody = document.getElementById('allSummaryTable');
  if (!tbody) return;
  const sorted = sortByMonth(DATA);
  const last = sorted.length - 1;
  tbody.innerHTML = sorted.map((d, i) => {
    const isCur = i === last;
    const net   = d.income - d.living_expense;       // 월 순저축
    const rate  = d.income > 0 ? (net / d.income * 100) : 0;
    const isDef = net < 0;
    const netColor  = isDef ? '#f87171' : '#34d399';
    const rateColor = isDef ? '#f87171' : '#34d399';
    const barW = Math.min(Math.abs(rate), 100);
    const wealth    = d.total_wealth;                // 누적 저축(=총재산)
    const sign = v => v >= 0 ? '+' : '';
    return `<tr class="${isCur ? 'month-highlight' : ''}">
      <td style="text-align:left;font-weight:${isCur?700:500};color:${isCur?'#10b981':'#ccc'}">${d.month}${isCur?' <span style="color:#fbbf24;font-size:10px">●</span>':''}</td>
      <td style="text-align:right;color:#10b981;font-variant-numeric:tabular-nums">${fmt(d.income)}</td>
      <td style="text-align:right;color:#f87171;font-variant-numeric:tabular-nums">${fmt(d.living_expense)}</td>
      <td style="text-align:right;color:${netColor};font-variant-numeric:tabular-nums;font-weight:500">${sign(net)}${fmt(net)}</td>
      <td style="text-align:right">
        <div class="pct-bar">
          <div class="pct-bar-track"><div class="pct-bar-fill ${isDef?'neg':''}" style="width:${barW}%"></div></div>
          <div class="pct-bar-value" style="color:${rateColor}">${rate.toFixed(1)}%</div>
        </div>
      </td>
      <td style="text-align:right;color:#6ee7b7;font-variant-numeric:tabular-nums">${fmt(wealth)}</td>
    </tr>`;
  }).join('');
}

// ── 전체 KPI ─────────────────────────────────────────────────────
function renderAllKPI() {
  const sorted = sortByMonth(DATA);
  const totIncome  = sorted.reduce((s,d) => s + d.income, 0);
  const totExpense = sorted.reduce((s,d) => s + d.living_expense, 0);
  const latestW    = sorted[sorted.length-1]?.total_wealth || 0;
  const firstW     = sorted[0]?.total_wealth || 0;
  const wGain      = latestW - firstW;
  const totSv      = sorted.reduce((s,d) => s + d.savings_net, 0);
  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card purple">
      ${_kpiEye('wealth')}
      <div class="kpi-label">현재 총재산</div>
      ${_kpiVal('wealth', fmt(latestW))}
      ${_kpiRevealed.wealth ? `<div class="kpi-badge ${wGain>=0?'up':'down'}">${wGain>=0?'▲':'▼'} ${fmt(Math.abs(wGain))} YTD</div>` : ''}
    </div>
    <div class="kpi-card green">
      ${_kpiEye('income')}
      <div class="kpi-label">연간 총수입</div>
      ${_kpiVal('income', fmt(totIncome), 'green-text')}
      <div class="kpi-sub">${sorted.length}개월 합계</div>
    </div>
    <div class="kpi-card red">
      ${_kpiEye('expense')}
      <div class="kpi-label">연간 생활지출</div>
      ${_kpiVal('expense', fmt(totExpense), 'red-text')}
      <div class="kpi-sub">저축/투자 제외</div>
    </div>
    <div class="kpi-card blue">
      ${_kpiEye('savings')}
      <div class="kpi-label">저축 순유입 합계</div>
      ${_kpiVal('savings', fmt(totSv), totSv>=0?'green-text':'red-text')}
      <div class="kpi-sub">투자·저축 계좌 순변동</div>
    </div>`;
}

// ── 재산 추이 라인 차트 ───────────────────────────────────────────
function renderWealthTrend() {
  const sorted = sortByMonth(DATA);
  drawLineChart('wealthTrendChart', sorted.map(d => d.month), [
    {label:'총재산', data: sorted.map(d => d.total_wealth), color: WEALTH_COL},
  ], {fill: true});
}

// ── 전체 월별 차트 (Stacked Bar + Income Line) ────────────────────
// 고정비 / 변동비 stacked + 수입 라인 오버레이
function renderAllMonthBar() {
  const sorted = sortByMonth(DATA);
  drawStackedBarLineChart(
    'allMonthBarChart',
    sorted.map(d => d.month),
    [
      {label: '고정지출', data: sorted.map(d => d.fixed_expense    || 0), color: '#4f8cff'},
      {label: '변동지출', data: sorted.map(d => d.variable_expense || 0), color: '#8b95a8'},
    ],
    {label: '수입', data: sorted.map(d => d.income || 0), color: INCOME_COL}

// ── 이번 달 수입/지출 바 (누적) ──────────────────────────────────
function renderIncomeExpenseBar(idx) {
  const sorted = sortByMonth(DATA);
  const curMonth = DATA[idx].month;
  const upto = sorted.filter(d => parseMonth(d.month) <= parseMonth(curMonth));
  drawBarChart('incomeExpenseChart', upto.map(d => d.month), [
    {label:'수입',     data: upto.map(d => d.income),        color: INCOME_COL},
    {label:'생활지출', data: upto.map(d => d.living_expense), color: EXPENSE_COL},
  ]);
  document.getElementById('incomeChartTitle').textContent = '월별 수입 vs 지출';
}

// ── 카테고리 파이 차트 ────────────────────────────────────────────
function renderCategoryPie(idx) {
  const d = DATA[idx];
  const slices = Object.entries(d.categories)
    .filter(([k, v]) => !EXCL_CATS.has(k) && v > 0)
    .sort((a, b) => b[1] - a[1])
    .map(([name, value]) => ({label: name, value, color: CAT_COLORS[name] || '#9ca3af'}));
  drawPieChart('categoryPieChart', slices);
  document.getElementById('pieChartTitle').textContent = `${d.month} 생활지출 구성`;
}

// ── 모바일 스와이프 닷 ────────────────────────────────────────────
function buildSwipeDots() {
  const deck = document.getElementById('cardsDeck');
  const dotsEl = document.getElementById('swipeDots');
  if (!deck || !dotsEl) return;
  const cards = Array.from(deck.querySelectorAll('.chart-card, .table-card'));
  if (!cards.length) { dotsEl.innerHTML = ''; return; }
  dotsEl.innerHTML = cards.map((_, i) => `<div class="swipe-dot${i===0?' active':''}" data-i="${i}"></div>`).join('');

  function updateDots() {
    const cW = (cards[0]?.offsetWidth || 200) + 12;
    const active = Math.round(deck.scrollLeft / cW);
    dotsEl.querySelectorAll('.swipe-dot').forEach((d, i) => d.classList.toggle('active', i === active));
    const lbl = document.getElementById('swipePageLabel');
    if (lbl && cards[active]) lbl.textContent = cards[active].dataset.pageLabel || '';
  }
  deck.removeEventListener('scroll', deck._dotHandler);
  deck._dotHandler = updateDots;
  deck.addEventListener('scroll', updateDots, {passive: true});
  dotsEl.querySelectorAll('.swipe-dot').forEach((dot, i) => {
    dot.addEventListener('click', () => {
      const cW = (cards[0]?.offsetWidth || 200) + 12;
      deck.scrollTo({left: i * cW, behavior: 'smooth'});
    });
  });
}

// ── 월별 뷰 렌더 ──────────────────────────────────────────────────
function renderMonthView(idx) {
  currentMonth = idx;
  renderKPI(idx);
  renderWealthTrend();
  renderIncomeExpenseBar(idx);
  renderCategoryPie(idx);
  renderCategoryBars(DATA[idx]);
  renderAccountTable(DATA[idx]);
  renderFixedTxTable(DATA[idx]);
  renderVarTxTable(DATA[idx]);

  document.getElementById('wealthTrendWrap').style.display  = '';
  document.getElementById('allMonthBarWrap').style.display  = 'none';
  document.getElementById('txPanel').style.display          = '';
  document.getElementById('allSummaryPanel').style.display  = 'none';
  document.getElementById('accountPanel').style.display     = '';
  // 카테고리별 지출 카드 다시 표시 (월별 뷰에선 항상 보임)
  const catBarsCard = document.getElementById('categoryBars').closest('.table-card');
  if (catBarsCard) catBarsCard.style.display = '';

  // Tx 서브탭 초기화 (고정지출)
  document.getElementById('fixedTxWrap').style.display = '';
  document.getElementById('varTxWrap').style.display   = 'none';
  document.getElementById('tabFixed').classList.add('active');
  document.getElementById('tabVar').classList.remove('active');

  buildSwipeDots();
}

// ── 전체 뷰 렌더 ─────────────────────────────────────────────────
function renderAllView() {
  // display 먼저 설정 → setupCanvas가 올바른 높이 읽음
  document.getElementById('wealthTrendWrap').style.display  = '';
  document.getElementById('allMonthBarWrap').style.display  = '';
  document.getElementById('txPanel').style.display          = 'none';
  document.getElementById('allSummaryPanel').style.display  = '';
  document.getElementById('accountPanel').style.display     = 'none';
  // 카테고리별 지출 카드 자체를 숨김 (전체 뷰에선 월별 데이터 없음)
  const catBarsCard = document.getElementById('categoryBars').closest('.table-card');
  if (catBarsCard) catBarsCard.style.display = 'none';
  document.getElementById('categoryBars').innerHTML = '';

  renderAllKPI();
  renderWealthTrend();
  renderAllMonthBar();
  renderAllSummaryTable();

  buildSwipeDots();
}

// ── 탭 전환 ──────────────────────────────────────────────────────
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('[data-month]');
  if (!tab) return;
  document.querySelectorAll('#tabs .tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  const m = parseInt(tab.dataset.month, 10);
  if (m === -1) renderAllView();
  else renderMonthView(m);
});

// ── 지출 서브탭 ───────────────────────────────────────────────────
document.getElementById('tabFixed').addEventListener('click', () => {
  document.getElementById('tabFixed').classList.add('active');
  document.getElementById('tabVar').classList.remove('active');
  document.getElementById('fixedTxWrap').style.display = '';
  document.getElementById('varTxWrap').style.display   = 'none';
});
document.getElementById('tabVar').addEventListener('click', () => {
  document.getElementById('tabVar').classList.add('active');
  document.getElementById('tabFixed').classList.remove('active');
  document.getElementById('varTxWrap').style.display   = '';
  document.getElementById('fixedTxWrap').style.display = 'none';
});

// ── FAB + 입력 모달 ───────────────────────────────────────────────
const _inpModal = document.getElementById('inpModal');

function _openModal() {
  _inpModal.classList.add('open');
  _inpModal.getBoundingClientRect(); // force reflow so CSS transition triggers
  _inpModal.classList.add('show');
  // focus는 직접 탭으로 — 자동 focus 시 키보드가 모달 전체를 덮음
}

function _closeModal() {
  _inpModal.classList.remove('show');
  setTimeout(() => _inpModal.classList.remove('open'), 230);
}

document.getElementById('fabAdd').addEventListener('click', _openModal);
document.getElementById('inpCloseBtn').addEventListener('click', _closeModal);
_inpModal.addEventListener('click', e => { if (e.target === _inpModal) _closeModal(); });

// ── 입력 모달: Apps Script URL (가계부_입력.html과 동일) ──────────
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwAm7nb_YR1LKVOGvHl48HYlfFCwpZEjgiw6oCHXGtENK17BkvjVO7JZEhnsQrUy7-a/exec';

// 카테고리 정의 (가계부_입력.html과 동일하게 유지)
const VAR_CATS = {
  '식비':       ['식재료','외식','패스트푸드','간식/카페','음료','배달음식','술/유흥'],
  '생활용품':   ['가구/가전','전자제품','소모품','주방/욕실','인테리어/청소'],
  '의복/미용':  ['의류/신발','헤어/뷰티','악세서리'],
  '건강/의료':  ['병원/의약','운동/스포츠'],
  '문화/여가':  ['문화생활','취미','게임','도박/경기'],
  '여행':       ['항공권','숙박','렌터카','여행경비'],
  '차량유지비': ['주유','차량수리/부품','세차','주차비','대중교통','차량등록'],
  '경조사/회비':['선물','모임/회비','데이트'],
  '기타':       ['출장비','세금/수수료','기타'],
};
const FIX_CATS = {
  '주거비':    ['렌트비','유틸리티'],
  '통신비':    ['인터넷','핸드폰'],
  '보험':      ['자동차보험','렌터보험','생명/의료보험'],
  '대출':      ['자동차대출','학자금','모기지'],
  '구독':      ['헬스장','OTT','AI 구독','음악/앱 구독','세차 구독','연회비','클라우드'],
  '저축/투자': ['저축','주식투자','은퇴연금'],
  '가족지원':  ['부모님 지원','기부'],
  '기타':      ['기타'],
};
const INP_ACCTS = [
  'Chase','Chase Sphire','Chase Marriott','Discover',
  'Venmo','Robinhood','Webull','401K','Roth IRA','Mortgage',
];

// 상태
let _inpMode = 'var', _inpMainCat = null;
let _inpSelectedAcct = localStorage.getItem('lastAccount') || 'Chase Sphire';

// 날짜 헬퍼
function _getMonthStr(dateVal) {
  const d = new Date(dateVal + 'T00:00:00');
  return `${d.getMonth()+1}월`;
}
function _getMMDD(dateVal) {
  const [, m, dd] = dateVal.split('-');
  return `${m}/${dd}`;
}

// 토스트
function _inpToast(msg, ms = 2400) {
  const el = document.getElementById('inpToast');
  el.textContent = msg;
  el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', ms);
}

// 오프라인 큐
function _savePending(payload) {
  const q = JSON.parse(localStorage.getItem('pendingTx') || '[]');
  q.push(payload);
  localStorage.setItem('pendingTx', JSON.stringify(q));
  _showPending();
}
function _showPending() {
  const q = JSON.parse(localStorage.getItem('pendingTx') || '[]');
  const wrap = document.getElementById('inpPendingWrap');
  const txt  = document.getElementById('inpPendingText');
  if (q.length > 0) {
    wrap.style.display = 'flex';
    txt.textContent = `미전송 ${q.length}건 — 온라인 연결 시 자동 전송`;
  } else {
    wrap.style.display = 'none';
  }
}
async function _retryPending() {
  const q = JSON.parse(localStorage.getItem('pendingTx') || '[]');
  if (!q.length || !navigator.onLine) return;
  const ok = [];
  for (const p of q) {
    try {
      const res = await fetch(APPS_SCRIPT_URL, {method:'POST', body: JSON.stringify(p)});
      if (res.ok) ok.push(p);
    } catch(e) { break; }
  }
  if (ok.length) {
    localStorage.setItem('pendingTx', JSON.stringify(q.filter(p => !ok.includes(p))));
    _showPending();
    _inpToast(`✅ ${ok.length}건 전송 완료`);
  }
}

function _buildChips() {
  const cats = _inpMode === 'var' ? VAR_CATS : FIX_CATS;
  const mainEl = document.getElementById('inpMainCatChips');
  const subEl  = document.getElementById('inpSubCatChips');
  const subLbl = document.getElementById('inpSubCatLabel');

  mainEl.innerHTML = Object.keys(cats).map(c =>
    `<div class="inp-chip${_inpMainCat===c?' active':''}" data-cat="${c}">${c}</div>`
  ).join('');

  if (_inpMainCat && cats[_inpMainCat]) {
    subEl.innerHTML = cats[_inpMainCat].map(s =>
      `<div class="inp-chip" data-sub="${s}">${s}</div>`
    ).join('');
    subLbl.style.display = '';
  } else { subEl.innerHTML = ''; subLbl.style.display = 'none'; }

  mainEl.querySelectorAll('.inp-chip').forEach(chip => {
    chip.addEventListener('click', () => { _inpMainCat = chip.dataset.cat; _buildChips(); });
  });
  subEl.querySelectorAll('.inp-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      subEl.querySelectorAll('.inp-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
    });
  });
}

function _buildAcctChips() {
  const el = document.getElementById('inpAcctChips');
  el.innerHTML = INP_ACCTS.map(a =>
    `<div class="inp-chip${a===_inpSelectedAcct?' active':''}" data-acct="${a}">${a}</div>`
  ).join('');
  el.querySelectorAll('.inp-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      el.querySelectorAll('.inp-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      _inpSelectedAcct = chip.dataset.acct;
      localStorage.setItem('lastAccount', _inpSelectedAcct);
    });
  });
}

document.getElementById('inpBtnVar').addEventListener('click', () => {
  _inpMode = 'var'; _inpMainCat = null;
  document.getElementById('inpBtnVar').classList.add('active');
  document.getElementById('inpBtnFix').classList.remove('active');
  _buildChips();
});
document.getElementById('inpBtnFix').addEventListener('click', () => {
  _inpMode = 'fix'; _inpMainCat = null;
  document.getElementById('inpBtnVar').classList.remove('active');
  document.getElementById('inpBtnFix').classList.add('active');
  _buildChips();
});

// 오프라인 배지
window.addEventListener('online',  () => { document.getElementById('inpOfflineBadge').style.display='none'; _retryPending(); });
window.addEventListener('offline', () => { document.getElementById('inpOfflineBadge').style.display=''; });

// 영수증 사진
document.getElementById('inpCameraBtn').addEventListener('click', () => {
  document.getElementById('inpCameraInput').click();
});
document.getElementById('inpCameraInput').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  document.getElementById('inpReceiptImg').src = URL.createObjectURL(f);
  document.getElementById('inpReceiptWrap').style.display = '';
});
document.getElementById('inpReceiptClear').addEventListener('click', () => {
  document.getElementById('inpReceiptWrap').style.display = 'none';
  document.getElementById('inpCameraInput').value = '';
});

// ── 저장 (Google Sheets 실제 전송) ────────────────────────────────
document.getElementById('inpSaveBtn').addEventListener('click', async () => {
  const amtEl  = document.getElementById('inpAmountInput');
  const amount = parseFloat(amtEl.value);
  if (!amount || isNaN(amount)) {
    amtEl.style.outline = '2px solid #f87171'; amtEl.focus(); return;
  }
  amtEl.style.outline = '';

  const mainCatEl = document.getElementById('inpMainCatChips').querySelector('.inp-chip.active');
  const subCatEl  = document.getElementById('inpSubCatChips').querySelector('.inp-chip.active');
  const acctEl    = document.getElementById('inpAcctChips').querySelector('.inp-chip.active');

  if (!mainCatEl) { _inpToast('❌ 대분류를 선택하세요'); return; }
  if (_inpMode === 'var' && !subCatEl) { _inpToast('❌ 소분류를 선택하세요'); return; }

  const dateVal  = document.getElementById('inpDateInput').value || new Date().toISOString().split('T')[0];
  const desc     = document.getElementById('inpDescInput').value.trim() || (subCatEl?.dataset.sub || mainCatEl.dataset.cat);
  const mainCat  = mainCatEl.dataset.cat;
  const subCat   = subCatEl?.dataset.sub || '';
  const acct     = acctEl?.dataset.acct || _inpSelectedAcct;

  const payload = {
    type:         _inpMode === 'var' ? 'variable' : 'fixed',
    month:        _getMonthStr(dateVal),
    date:         _getMMDD(dateVal),
    category:     _inpMode === 'var' ? subCat : mainCat,
    subcategory:  _inpMode === 'fix' ? subCat : undefined,
    mainCategory: mainCat,
    desc,
    account:      acct,
    amount,
    timestamp:    new Date().toISOString(),
  };

  const btn = document.getElementById('inpSaveBtn');
  btn.disabled = true; btn.textContent = '저장 중…';

  if (navigator.onLine) {
    try {
      const res = await fetch(APPS_SCRIPT_URL, {method: 'POST', body: JSON.stringify(payload)});
      if (res.ok) {
        _inpToast(`✅ ${mainCat} · ${desc}  $${amount.toFixed(2)} 저장 완료!`);
        _resetInpForm();
        _closeModal();
      } else throw new Error('server');
    } catch(e) {
      _savePending(payload);
      _inpToast('📦 오프라인 저장 — 나중에 자동 전송됩니다');
      _closeModal();
    }
  } else {
    _savePending(payload);
    _inpToast('📦 오프라인 저장됨');
    _closeModal();
  }

  btn.disabled = false; btn.textContent = 'Save';
});

function _resetInpForm() {
  document.getElementById('inpAmountInput').value = '';
  document.getElementById('inpDescInput').value   = '';
  document.getElementById('inpReceiptWrap').style.display = 'none';
  document.getElementById('inpCameraInput').value = '';
  _inpMainCat = null;
  _buildChips();
}

// ── 리사이즈 시 차트 재렌더 ──────────────────────────────────────
let _rzTimer;
window.addEventListener('resize', () => {
  clearTimeout(_rzTimer);
  _rzTimer = setTimeout(() => {
    const isAll = document.getElementById('allMonthBarWrap')?.style.display !== 'none';
    if (isAll) renderAllView(); else renderMonthView(currentMonth);
  }, 200);
});

// ── 초기화 ───────────────────────────────────────────────────────
async function init() {
  // 날짜 기본값 설정
  document.getElementById('inpDateInput').value = new Date().toISOString().split('T')[0];

  // 오프라인 배지 초기 상태
  if (!navigator.onLine) document.getElementById('inpOfflineBadge').style.display = '';

  // 미전송 큐 표시
  _showPending();

  // Google Sheets 로드 시도
  try { await loadFromGoogleSheets(); } catch(e) {}

  // 현재 달 탭 활성화
  document.querySelectorAll('#tabs .tab').forEach(t => {
    const m = parseInt(t.dataset.month, 10);
    t.classList.toggle('active', m === currentMonth);
  });

  // 입력 모달 칩 빌드
  _buildChips();
  _buildAcctChips();

  // 렌더
  renderMonthView(currentMonth);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
