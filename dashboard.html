<title>2026 가계부 대시보드</title>
<!-- Chart.js 제거 → 순수 Canvas로 교체 -->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0c1210;
    color: #e4e4f0;
    min-height: 100vh;
  }

  /* Header */
  header {
    background: linear-gradient(135deg, #0d1f17 0%, #111c18 100%);
    padding: 24px 32px;
    border-bottom: 1px solid #1a3326;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
  header h1 span { color: #10b981; }
  .header-right { font-size: 13px; color: #888; }

  /* Month Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 16px 32px;
    background: #0f1a13;
    border-bottom: 1px solid #1a2e22;
    overflow-x: auto;
  }
  .tab {
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    color: #aaa;
    background: transparent;
  }
  .tab:hover { background: #162318; color: #e4e4f0; }
  .tab.active {
    background: #10b981;
    color: #fff;
    border-color: #10b981;
  }

  /* Main Layout */
  .main { padding: 28px 32px; max-width: 1400px; }

  /* KPI Cards */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .kpi-card {
    background: #121a14;
    border: 1px solid #1e3028;
    border-radius: 14px;
    padding: 20px 22px;
    position: relative;
    overflow: hidden;
  }
  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 14px 14px 0 0;
  }
  .kpi-card.purple::before { background: linear-gradient(90deg, #10b981, #6ee7b7); }
  .kpi-card.green::before  { background: linear-gradient(90deg, #059669, #10b981); }
  .kpi-card.red::before    { background: linear-gradient(90deg, #f87171, #fca5a5); }
  .kpi-card.blue::before   { background: linear-gradient(90deg, #34d399, #6ee7b7); }
  .kpi-label { font-size: 12px; color: #888; font-weight: 500; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-value { font-size: 30px; font-weight: 800; color: #fff; letter-spacing: -1px; }
  .kpi-value.red-text { color: #f87171; }
  .kpi-value.green-text { color: #10b981; }
  .kpi-sub { font-size: 12px; color: #666; margin-top: 4px; }
  .kpi-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    margin-top: 6px;
  }
  .kpi-badge.up { background: rgba(16,185,129,0.15); color: #10b981; }
  .kpi-badge.down { background: rgba(248,113,113,0.15); color: #f87171; }

  /* ── KPI 프라이버시 마스크 (탭/클릭 토글) ── */
  .kpi-value {
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.18s ease;
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .kpi-value.masked {
    color: #555 !important;
    letter-spacing: 2px;
    font-family: monospace;
  }
  .kpi-value.masked::after {
    content: '\1F441';
    font-size: 14px;
    opacity: 0.5;
    letter-spacing: 0;
    margin-left: 4px;
  }
  .kpi-value:active { opacity: 0.6; }
  .kpi-card { position: relative; }
  .kpi-eye {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    color: #666;
    font-size: 11px;
    line-height: 22px;
    text-align: center;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.18s, color 0.18s;
  }
  .kpi-eye:hover { background: rgba(255,255,255,0.08); color: #aaa; }
  .kpi-eye.revealed { color: #10b981; background: rgba(16,185,129,0.12); }

  /* Charts Row */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  .chart-card {
    background: #121a14;
    border: 1px solid #1e3028;
    border-radius: 14px;
    padding: 22px;
  }
  .chart-title {
    font-size: 14px;
    font-weight: 600;
    color: #ccc;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .chart-title .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #10b981;
  }
  .chart-container { position: relative; }

  /* Bottom Row */
  .bottom-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .table-card {
    background: #121a14;
    border: 1px solid #1e3028;
    border-radius: 14px;
    padding: 22px;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left;
    padding: 8px 10px;
    color: #666;
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid #1e3028;
  }
  tbody tr { border-bottom: 1px solid #1a2c22; transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #162318; }
  tbody td { padding: 9px 10px; color: #ddd; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
  }
  .badge-purple { background: rgba(16,185,129,0.15); color: #6ee7b7; }
  .badge-green  { background: rgba(52,211,153,0.15); color: #6ee7b7; }
  .badge-blue   { background: rgba(96,165,250,0.15); color: #93c5fd; }
  .badge-orange { background: rgba(251,146,60,0.15); color: #fba040; }
  .badge-red    { background: rgba(248,113,113,0.15); color: #f87171; }

  /* Category bars */
  .cat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .cat-name { width: 90px; font-size: 12px; color: #aaa; flex-shrink: 0; }
  .cat-bar-wrap { flex: 1; height: 8px; background: #1e3028; border-radius: 4px; overflow: hidden; }
  .cat-bar { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
  .cat-amount { width: 75px; text-align: right; font-size: 12px; color: #ccc; flex-shrink: 0; }

  .savings-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #1e3028;
  }
  .savings-row:last-child { border-bottom: none; }
  .savings-label { font-size: 13px; color: #aaa; }
  .savings-value { font-size: 14px; font-weight: 600; color: #fff; }

  /* Full-width chart */
  .full-chart {
    margin-bottom: 24px;
  }

  /* 전체 탭 특별 스타일 */
  .tab-all {
    border: 1px solid #1e3028 !important;
    color: #6ee7b7 !important;
  }
  .tab-all.active {
    background: linear-gradient(135deg, #059669, #10b981) !important;
    color: #fff !important;
    border-color: #059669 !important;
  }

  /* 전체 뷰 요약 테이블 */
  .savings-positive { color: #10b981; font-weight: 600; }
  .savings-negative { color: #f87171; font-weight: 600; }
  .month-highlight { background: rgba(16,185,129,0.08) !important; }

  /* 차트 툴팁 */
  .chart-tooltip {
    position: fixed;
    background: rgba(8,15,10,0.97);
    border: 1px solid #2a4438;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: #e4e4f0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.14s ease;
    box-shadow: 0 8px 28px rgba(0,0,0,0.65), 0 0 0 1px rgba(16,185,129,0.08);
    max-width: 210px;
    min-width: 140px;
    line-height: 1.6;
  }
  .chart-tooltip.vis { opacity: 1; }
  .chart-tooltip .tt-header { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 7px; padding-bottom: 6px; border-bottom: 1px solid #1e3028; }
  .chart-tooltip .tt-row { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-top: 3px; }
  .chart-tooltip .tt-lhs  { display:flex; align-items:center; gap:5px; color:#888; }
  .chart-tooltip .tt-sw   { width:7px; height:7px; border-radius:2px; flex-shrink:0; }
  .chart-tooltip .tt-val  { font-weight:600; font-variant-numeric: tabular-nums; }

  /* 지출 내역 탭 */
  .tx-tabs { display:flex; gap:6px; }
  .tx-tab {
    padding: 4px 14px; border-radius: 6px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: 1px solid #1e3028; background: transparent; color: #888;
    transition: all 0.15s;
  }
  .tx-tab:hover { background: #162318; color: #e4e4f0; }

  @media (max-width: 768px) {

  /* ───────────────────────────────────────────────────────

   * 모바일:  카드 deck → 좌우 swipe + scroll-snap
   * ───────────────────────────────────────────────────────*/
  .cards-deck { position: relative; }
  .swipe-dots { display: none; }
  .swipe-page-label {
    display: none;
    text-align: center;
    font-size: 11px;
    color: #6b7280;
    letter-spacing: 0.4px;
    font-weight: 500;
    padding: 0 0 6px;
    height: 14px;
    line-height: 14px;
  }

  @media (max-width: 768px) {
    /* deck 자체가 수평 swipe 레인 — touch-action 은 기본(auto)로 두어
     * 짧은 카드에선 수평 swipe, 긴 카드 내부에선 수직 swipe가 각각
     * 자연스럽게 분리되도록 한다. (pan-x를 강제하면 카드 내부 수직 스크롤이 죽음) */
    .cards-deck {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      align-items: flex-start;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      overscroll-behavior-x: contain;    /* 수평만 contain, 수직은 페이지로 propagate 가능 */
      -webkit-overflow-scrolling: touch;
      gap: 12px;
      margin: 4px -14px 0;
      padding: 4px 14px 14px;
      scrollbar-width: none;
      will-change: scroll-position, height;
      transition: height 0.28s ease;
    }
    .cards-deck::-webkit-scrollbar { display: none; }

    /* 기존 row 래퍼를 투명화 → 카드가 deck의 직속 flex item이 됨 */
    .charts-row,
    .bottom-row { display: contents; }

    /* 카드 폭 = viewport. 높이는 콘텐츠가 결정하되 viewport-cap.
     * max-height 초과 시 카드 내부에서 vertical scroll → 페이지가 viewport 안에 들어와
     * 수평/수직 swipe가 자연스럽게 구분됨. */
    .cards-deck .chart-card,
    .cards-deck .table-card {
      flex: 0 0 calc(100vw - 40px);
      max-width: calc(100vw - 40px);
      align-self: flex-start;
      scroll-snap-align: center;
      scroll-snap-stop: always;
      margin: 0 !important;
      max-height: calc(100vh - 220px);
      max-height: calc(100dvh - 220px);  /* iOS 15.4+ — 주소창 fold 대응 */
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;       /* 카드 내부 스크롤 끝에서 페이지로 chain 차단 */
      box-shadow: 0 2px 8px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.02);
      transform: translateZ(0);
    }
    .cards-deck .full-chart { margin-bottom: 0 !important; }

    /* 차트 캔버스 가독성 — 모바일에서는 더 큰 높이 */
    .cards-deck .chart-card .chart-container {
      height: 240px !important;
    }

    /* 카드 내부 scrollbar 스타일 — iOS에선 기본 숨김, Android Chrome 등 호환 */
    .cards-deck .chart-card::-webkit-scrollbar,
    .cards-deck .table-card::-webkit-scrollbar {
      width: 4px;
    }
    .cards-deck .chart-card::-webkit-scrollbar-thumb,
    .cards-deck .table-card::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
    }

    /* ── pagination dots ── */
    .swipe-dots {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      padding: 4px 14px 4px;
      margin: 0 0 6px;
      min-height: 18px;
    }
    .swipe-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #233028;
      transition: background 0.22s ease, width 0.22s ease;
      flex-shrink: 0;
      /* thumb-friendly hit target */
      position: relative;
    }
    .swipe-dot::before {
      content: '';
      position: absolute;
      inset: -10px;
    }
    .swipe-dot.active {
      width: 22px;
      border-radius: 3px;
      background: #10b981;
    }

    .swipe-page-label { display: block; }

    /* 탭 - thumb-friendly */
    .tab {
      padding: 9px 16px;
      font-size: 13px;
      min-height: 36px;

      align-items: center;

    .tabs {

    /* 거래 내역 탭 */

    /* safe area 패딩 (iPhone notch / home indicator 대응) */
    .tabs { padding-left: max(14px, env(safe-area-inset-left)); padding-right: max(14px, env(safe-area-inset-right)); }
    .main { padding-left: max(14px, env(safe-area-inset-left)); padding-right: max(14px, env(safe-area-inset-right)); padding-bottom: max(16px, env(safe-area-inset-bottom)); }
  }

  @media (max-width: 420px) {
    .cards-deck .chart-card,
    .cards-deck .table-card {
      flex: 0 0 calc(100vw - 32px);
      max-width: calc(100vw - 32px);

  }

  /* ── 툴팁 모바일 close 버튼 (터치 디바이스 전용) ── */
  .chart-tooltip .tt-close {

    /* 터치 환경에서는 cursor crosshair 제거 */

<script>
// ── Google Sheets 실시간 연동 설정 ─────────────────────────
// sync_to_gsheets.py 실행 후 자동으로 채워집니다.
// 직접 입력하려면: Google Sheets URL에서 /d/ 다음 부분을 복사
const GSHEET_ID = '1yQezCSU6RioQIm-9W7eszwj1K3vM_xvNVdVjNrxA-eQ';  // 예: '1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms'

// CSV 파싱 헬퍼 (쉼표·따옴표 처리)
function parseCSV(text) {
  const rows = [], lines = text.split('\n');
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = [], re = /("(?:[^"]|"")*"|[^,]*)(,|$)/g;
    let m;
    while ((m = re.exec(line)) !== null) {
      let v = m[1];
      if (v.startsWith('"') && v.endsWith('"')) v = v.slice(1, -1).replace(/""/g, '"');
      cols.push(v);
      if (m[2] === '') break;
    }
    rows.push(cols);
  }
  return rows;
}

// Google Sheets에서 DATA + VTX 불러오기
async function loadFromGoogleSheets() {
  if (!GSHEET_ID) return false;
  const base = `https://docs.google.com/spreadsheets/d/${GSHEET_ID}/export?format=csv&sheet=`;
  try {
    const [dataRes, vtxRes, fixedRes] = await Promise.all([
      fetch(base + 'DATA'),
      fetch(base + 'VTX'),
      fetch(base + 'FIXED'),
    ]);
    if (!dataRes.ok || !vtxRes.ok) return false;

    // DATA 시트 파싱
    const dataRows = parseCSV(await dataRes.text());
    const dHeader = dataRows[0];
    const newDATA = dataRows.slice(1).map(row => {
      const obj = {};
      dHeader.forEach((h, i) => obj[h] = row[i] || '');
      return {
        month:         obj.month,
        total_wealth:  parseFloat(obj.total_wealth)  || 0,
        bank_balance:  parseFloat(obj.bank_balance)  || 0,
        savings:       parseFloat(obj.savings)        || 0,
        stocks:        parseFloat(obj.stocks)         || 0,
        income:        parseFloat(obj.income)         || 0,
        total_expense: parseFloat(obj.total_expense)  || 0,
        categories:    obj.categories  ? JSON.parse(obj.categories)  : {},
        accounts:      obj.accounts    ? JSON.parse(obj.accounts)    : [],
        fixed_tx:      obj.fixed_tx    ? JSON.parse(obj.fixed_tx)    : [],
      };
    }).filter(d => d.month);

    // VTX 시트 파싱
    const vtxRows = parseCSV(await vtxRes.text());
    const vHeader = vtxRows[0];
    const newVTX = {};
    vtxRows.slice(1).forEach(row => {
      const obj = {};
      vHeader.forEach((h, i) => obj[h] = row[i] || '');
      if (!obj.month) return;
      if (!newVTX[obj.month]) newVTX[obj.month] = [];
      newVTX[obj.month].push({
        date:     obj.date,
        category: obj.category,
        desc:     obj.desc,
        account:  obj.account,
        amount:   parseFloat(obj.amount) || 0,
      });
    });

    // FIXED 시트 파싱 (있으면)
    if (fixedRes.ok) {
      const fRows = parseCSV(await fixedRes.text());
      const fHeader = fRows[0];
      const fixedByMonth = {};
      fRows.slice(1).forEach(row => {
        const obj = {};
        fHeader.forEach((h, i) => obj[h] = row[i] || '');
        if (!obj.month) return;
        if (!fixedByMonth[obj.month]) fixedByMonth[obj.month] = [];
        fixedByMonth[obj.month].push({
          date: obj.date, category: obj.category,
          sub: obj.subcategory || '', desc: obj.desc,
          account: obj.account, amount: parseFloat(obj.amount) || 0,
        });
      });
      newDATA.forEach(d => { d.fixed_tx = fixedByMonth[d.month] || []; });
    }

    // 데이터가 비어있으면 내장 데이터 유지 (CORS 등으로 빈 응답이 온 경우)
    if (newDATA.length === 0) {
      console.warn('[GSheets] 빈 데이터 수신 — 내장 데이터 유지');
      return false;
    }

    // 전역 DATA/VTX 교체
    DATA.length = 0;
    newDATA.forEach(d => DATA.push(d));
    Object.keys(VTX).forEach(k => delete VTX[k]);
    Object.assign(VTX, newVTX);
    console.log(`[GSheets] ${DATA.length}개월 로드 완료`);

    // 헤더 업데이트 표시
    const hr = document.querySelector('.header-right');
    if (hr) hr.textContent = '실시간 • ' + hr.textContent;
    return true;
  } catch(e) {
    console.warn('[GSheets] 로드 실패, 내장 데이터 사용:', e.message);
    return false;
  }

});

function fmt(n) {
  if (n === null || n === undefined) return '-';
  const abs = Math.abs(n);
  const str = abs >= 1000 ? '$' + abs.toLocaleString('en', {minimumFractionDigits:0, maximumFractionDigits:0}) : '$' + abs.toFixed(2);
  return n < 0 ? '-' + str : str;
}

// ── 통합 월 파서 (chronological 정렬 전용) ────────────────────
// "1월", "01월", "2026년 1월", "2026-01", "01", "Jan", "January" 등 다양한 포맷 지원
// locale·date format 차이로 순서가 깨지지 않게 모든 차트가 이 한 함수만 사용
const _MONTH_NAMES = {
  jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12,
  january:1,february:2,march:3,april:4,june:6,july:7,august:8,
  september:9,october:10,november:11,december:12
};
function parseMonth(monthStr) {
  if (monthStr === null || monthStr === undefined) return 0;
  const s = String(monthStr).trim().toLowerCase();
  // "1월", "01월"
  let m = s.match(/(\d+)\s*월/);
  if (m) return parseInt(m[1], 10);
  // "2026-01", "2026/01", "2026.01"
  m = s.match(/\d{4}[-./](\d{1,2})/);
  if (m) return parseInt(m[1], 10);
  // English month names
  const namePart = s.replace(/[^a-z]/g, '');
  if (namePart && _MONTH_NAMES[namePart]) return _MONTH_NAMES[namePart];
  // 단순 숫자 ("01", "1", "12")
  m = s.match(/^\s*(\d{1,2})\s*$/);
  if (m) return parseInt(m[1], 10);
  // 마지막 폴백: 첫 숫자
  m = s.match(/(\d+)/);
  return m ? parseInt(m[1], 10) : 0;
}
function sortByMonth(arr) {
  return [...arr].sort((a, b) => parseMonth(a.month) - parseMonth(b.month));
}

// ── KPI 프라이버시 마스크 ────────────────────────────
// 기본 상태: 모든 KPI 값이 가려짐. 해당 카드 탭/클릭 시 토글.
// 어떤 카드가 공개되었는지 메모리에 유지하여 월 전환·재렌더 후에도 사용자 선택 유지.
const KPI_KEYS = ['wealth', 'income', 'expense', 'savings'];
const _kpiRevealed = {};
KPI_KEYS.forEach(k => _kpiRevealed[k] = false);

const KPI_MASK = '$' + '•'.repeat(5);

function _kpiVal(key, realText, extraClass) {
  const revealed = _kpiRevealed[key];
  const cls = 'kpi-value' + (extraClass ? ' ' + extraClass : '') + (revealed ? '' : ' masked');
  const shown = revealed ? realText : KPI_MASK;
  return `<div class="${cls}" data-kpi="${key}" aria-label="${revealed ? '숨기기' : '금액 보기'}">${shown}</div>`;
}

function _kpiEye(key) {
  const revealed = _kpiRevealed[key];
  return `<div class="kpi-eye${revealed ? ' revealed' : ''}" data-kpi-eye="${key}" title="${revealed ? '숨기기' : '보기'}">${revealed ? '🙈' : '👁'}</div>`;
}

function toggleKpi(key) {
  if (!(key in _kpiRevealed)) return;
  _kpiRevealed[key] = !_kpiRevealed[key];
  // 현재 모드(월별/전체) 그대로 KPI만 다시 그리도록
  const allBar = document.getElementById('allMonthBarWrap');
  const isAll = allBar && allBar.style.display !== 'none';
  if (isAll) renderAllKPI(); else renderKPI(currentMonth);
}

// 위임된 클릭 핸들러 (kpiGrid 한 번만 등록)
document.addEventListener('DOMContentLoaded', () => {
  const grid = document.getElementById('kpiGrid');
  if (!grid) return;
  grid.addEventListener('click', e => {
    const eye = e.target.closest('[data-kpi-eye]');
    const val = e.target.closest('[data-kpi]');
    const key = (eye && eye.dataset.kpiEye) || (val && val.dataset.kpi);
    if (!key) return;
    toggleKpi(key);
  });
});

function renderKPI(idx) {
  const d = DATA[idx];
  const prev = idx > 0 ? DATA[idx-1] : null;
  const wealthDiff = prev ? d.total_wealth - prev.total_wealth : 0;
  const wealthPct = prev ? ((wealthDiff / prev.total_wealth) * 100).toFixed(1) : 0;
  const sn = d.savings_net;
  const rev = _kpiRevealed;

  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card purple">
      ${_kpiEye('wealth')}
      <div class="kpi-label">총 재산</div>
      ${_kpiVal('wealth', fmt(d.total_wealth))}
      ${prev && rev.wealth ? `<div class="kpi-badge ${wealthDiff >= 0 ? 'up' : 'down'}">${wealthDiff >= 0 ? '▲' : '▼'} ${fmt(Math.abs(wealthDiff))} (${Math.abs(wealthPct)}%)</div>` : ''}
    </div>
    <div class="kpi-card green">
      ${_kpiEye('income')}
      <div class="kpi-label">총 수입</div>
      ${_kpiVal('income', fmt(d.income), 'green-text')}
      <div class="kpi-sub">Chase 3계좌 입금</div>
    </div>
    <div class="kpi-card red">
      ${_kpiEye('expense')}
      <div class="kpi-label">생활 지출</div>
      ${_kpiVal('expense', fmt(d.living_expense), 'red-text')}
      <div class="kpi-sub">저축/투자 제외 실지출</div>
    </div>
    <div class="kpi-card blue">
      ${_kpiEye('savings')}
      <div class="kpi-label">저축 순유입</div>

      <div class="kpi-sub">투자·저축 계좌 순변동</div>
    </div>
  `;
}

// roundRect 폴리필 (구형 브라우저 대비)
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    const rad = Array.isArray(r) ? r[0] : r;
    this.moveTo(x + rad, y);
    this.lineTo(x + w - rad, y); this.quadraticCurveTo(x+w, y, x+w, y+rad);
    this.lineTo(x + w, y + h - rad); this.quadraticCurveTo(x+w, y+h, x+w-rad, y+h);
    this.lineTo(x + rad, y + h); this.quadraticCurveTo(x, y+h, x, y+h-rad);
    this.lineTo(x, y + rad); this.quadraticCurveTo(x, y, x+rad, y);
    this.closePath();
  };
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}
// ── DPR 적용 캔버스 셋업 ─────────────────────────────────
// HiDPI 디스플레이에서 텍스트·라인이 sharp하게 보이도록 backing store는
// 네이티브 픽셀(cssW * dpr) 크기로, CSS 표시는 cssW로 분리. setTransform으로
// drawing 명령은 CSS 픽셀 단위로 받음.
function setupCanvas(id) {
  const canvas = document.getElementById(id);
  const parent = canvas.parentElement;
  const dpr  = Math.min(window.devicePixelRatio || 1, 3); // 3배까지만 (메모리 보호)
  const cssW = parent.offsetWidth  || 500;
  const cssH = parent.offsetHeight || 220;
  // backing store = native pixels
  canvas.width  = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  // 표시 크기 = CSS pixels
  canvas.style.width  = cssW + 'px';
  canvas.style.height = cssH + 'px';
  // 차트·hit-test에서 사용
  canvas._cssW = cssW;
  canvas._cssH = cssH;
  canvas._dpr  = dpr;
  const ctx = canvas.getContext('2d');
  // 이후 모든 drawing 명령은 CSS 픽셀로 받음 → 자동으로 dpr 배율 native 픽셀에 그려짐
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return ctx;
}

// ── 툴팁 HTML 빌더 (통일 스타일) ──────────────────────────
function _ttHtml(title, rows) {
  const rowsHtml = rows.map(r =>
    `<div class="tt-row"><span class="tt-lhs"><span class="tt-sw" style="background:${r.color||'#888'}"></span>${r.label}</span><span class="tt-val" style="color:${r.color||'#ccc'}">${r.val}</span></div>`
  ).join('');
  return `<div class="tt-header">${title}</div>${rowsHtml}`;
}

// ── 툴팁 & 호버 인터랙션 시스템 ─────────────────────────────
const _tt = document.getElementById('chartTooltip');
const _hz = {};          // canvasId → [{x,y,w,h,html}]
const _pz = {};          // canvasId → {cx,cy,outerR,innerR,slices:[{s,e,html}]}
const _snap = {};        // canvasId → ImageData (렌더 후 스냅샷)
const _pieAngles = {};   // canvasId → [{rawStart, sweep, color}]

function _setHz(id, zones) { _hz[id] = zones; }
function _setPz(id, data)  { _pz[id] = data; }

function _normAngle(a) { return ((a % (Math.PI*2)) + Math.PI*2) % (Math.PI*2); }

// 렌더 후 스냅샷 저장 → 호버 하이라이트 복원용
function _saveSnap(id) {
  const cvs = document.getElementById(id);
  if (!cvs) return;
  _snap[id] = cvs.getContext('2d').getImageData(0, 0, cvs.width, cvs.height);
  cvs._prevBar = -1;
}

// ── 캔버스에서 mx,my 좌표로 hit-test → {idx, html} 반환 (없으면 null) ──
function _hitTest(cvs, id, mx, my) {
  // 파이 도넛
  const pz = _pz[id];
  if (pz) {
    const dx = mx - pz.cx, dy = my - pz.cy, dist = Math.sqrt(dx*dx + dy*dy);
    if (dist <= pz.outerR && dist >= pz.innerR) {
      const ang = _normAngle(Math.atan2(dy, dx) + Math.PI/2);
      for (let si = 0; si < pz.slices.length; si++) {
        const s = pz.slices[si];
        if (s.s <= s.e ? (ang>=s.s && ang<s.e) : (ang>=s.s || ang<s.e)) {
          return {kind:'pie', idx:si, html:s.html};
        }
      }
    }
  }
  // 바 차트 zones
  const zones = _hz[id] || [];
  for (let zi = 0; zi < zones.length; zi++) {
    const z = zones[zi];
    if (mx>=z.x && mx<=z.x+z.w && my>=z.y && my<=z.y+z.h) {
      return {kind:'bar', idx:zi, html:z.html};
    }
  }
  return null;
}

// 파이 하이라이트 그리기 (mousemove + touch 공용)
function _drawPieHighlight(cvs, id, idx) {
  const ctx2 = cvs.getContext('2d');
  if (_snap[id]) ctx2.putImageData(_snap[id], 0, 0);
  const pz = _pz[id];
  if (!pz) return;
  const ad = (_pieAngles[id] || [])[idx];
  if (!ad) return;
  ctx2.save();
  ctx2.beginPath();
  ctx2.arc(pz.cx, pz.cy, pz.outerR + 5,
    ad.rawStart + 0.02, ad.rawStart + ad.sweep - 0.02);
  ctx2.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx2.lineWidth = 2;
  ctx2.shadowColor = ad.color;
  ctx2.shadowBlur = 10;
  ctx2.stroke();
  ctx2.restore();
}

// 바 하이라이트 그리기 (CSS 픽셀 기준 — ctx는 dpr scale 적용 상태)
function _drawBarHighlight(cvs, id, idx) {
  const ctx2 = cvs.getContext('2d');
  if (_snap[id]) ctx2.putImageData(_snap[id], 0, 0);
  const zones = _hz[id] || [];
  const z = zones[idx];
  if (!z) return;
  const cssH = cvs._cssH || cvs.height;
  ctx2.fillStyle = 'rgba(255,255,255,0.055)';
  ctx2.fillRect(z.x, 0, z.w, cssH);
  ctx2.fillStyle = 'rgba(255,255,255,0.10)';
  ctx2.fillRect(z.x, 0, z.w, 1);
}

// snapshot 복원 (호버 / 탭 해제 시)
function _restoreSnap(cvs, id) {
  if (_snap[id]) {
    cvs.getContext('2d').putImageData(_snap[id], 0, 0);
    cvs._prevBar = -1;
  }
}

// 모바일 터치 환경 감지
const IS_TOUCH = (window.matchMedia && window.matchMedia('(hover: none) and (pointer: coarse)').matches)
              || ('ontouchstart' in window && navigator.maxTouchPoints > 0);

// 현재 활성 툴팁 canvas (outside-tap close 추적용)
let _activeTooltipCvs = null;
let _activeTooltipIdx = null;

function _ttSetup(id) {
  const cvs = document.getElementById(id);
  if (!cvs || cvs._ttOk) return;
  cvs._ttOk = true;
  cvs.style.cursor = IS_TOUCH ? 'default' : 'crosshair';

  // ─── 데스크탑: mousemove 호버 ───
  cvs.addEventListener('mousemove', e => {
    const rect = cvs.getBoundingClientRect();
    // CSS 픽셀 단위로 hit-test (zones·pieAngles도 CSS 픽셀로 저장됨)
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const ctx2 = cvs.getContext('2d');

    // ── 파이 도넛 히트 테스트 ──
    const pz = _pz[id];
    if (pz) {
      const dx = mx - pz.cx, dy = my - pz.cy, dist = Math.sqrt(dx*dx+dy*dy);
      if (dist <= pz.outerR && dist >= pz.innerR) {
        const ang = _normAngle(Math.atan2(dy,dx) + Math.PI/2);
        for (let si = 0; si < pz.slices.length; si++) {
          const s = pz.slices[si];
          if (s.s <= s.e ? (ang>=s.s && ang<s.e) : (ang>=s.s || ang<s.e)) {
            if (cvs._prevBar !== si) {
              cvs._prevBar = si;
              if (_snap[id]) ctx2.putImageData(_snap[id], 0, 0);
              const ad = (_pieAngles[id] || [])[si];
              if (ad) {
                ctx2.save();
                ctx2.beginPath();
                ctx2.arc(pz.cx, pz.cy, pz.outerR + 5,
                  ad.rawStart + 0.02, ad.rawStart + ad.sweep - 0.02);
                ctx2.strokeStyle = 'rgba(255,255,255,0.55)';
                ctx2.lineWidth = 2;
                ctx2.shadowColor = ad.color;
                ctx2.shadowBlur = 10;
                ctx2.stroke();
                ctx2.restore();
              }
            }
            _ttShow(e, s.html);
            return;
          }
        }
      }
      // 파이 영역 밖: 호버 초기화
      if (cvs._prevBar >= 0 && _snap[id]) {
        ctx2.putImageData(_snap[id], 0, 0);
        cvs._prevBar = -1;
      }
    }

    // ── 바 차트 열 히트 테스트 ──
    let foundBar = -1;
    const zones = _hz[id] || [];
    for (let zi = 0; zi < zones.length; zi++) {
      const z = zones[zi];
      if (mx>=z.x && mx<=z.x+z.w && my>=z.y && my<=z.y+z.h) { foundBar = zi; break; }
    }
    const prevBar = cvs._prevBar !== undefined ? cvs._prevBar : -1;
    if (foundBar !== prevBar) {
      cvs._prevBar = foundBar;
      if (_snap[id]) ctx2.putImageData(_snap[id], 0, 0);
      if (foundBar >= 0) {
        // 호버 열 오버레이 (CSS 픽셀 기준 — ctx는 dpr scale 적용된 상태)
        const z = zones[foundBar];
        const cssH = cvs._cssH || cvs.height;
        ctx2.fillStyle = 'rgba(255,255,255,0.055)';
        ctx2.fillRect(z.x, 0, z.w, cssH);
        ctx2.fillStyle = 'rgba(255,255,255,0.10)';
        ctx2.fillRect(z.x, 0, z.w, 1);
      }
    }
    if (foundBar >= 0) _ttShow(e, zones[foundBar].html);
    else _ttHide();
  });

  cvs.addEventListener('mouseleave', () => {
    if (IS_TOUCH) return;  // 터치 환경에선 무시
    _ttHide();
    if (_snap[id]) {
      cvs.getContext('2d').putImageData(_snap[id], 0, 0);
      cvs._prevBar = -1;
    }
  });

  // ─── 모바일: tap 인터랙션 ───
  // touchstart 시점, 위치 기록 → touchend에서 거리/시간으로 tap 판정 (swipe와 구분)
  let _tStart = 0, _tx0 = 0, _ty0 = 0, _moved = false;
  cvs.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    _tStart = Date.now();
    _tx0 = e.touches[0].clientX;
    _ty0 = e.touches[0].clientY;
    _moved = false;
  }, {passive: true});

  cvs.addEventListener('touchmove', e => {
    if (e.touches.length !== 1) return;
    const dx = Math.abs(e.touches[0].clientX - _tx0);
    const dy = Math.abs(e.touches[0].clientY - _ty0);
    if (dx > 8 || dy > 8) _moved = true;
  }, {passive: true});

  cvs.addEventListener('touchend', e => {
    if (_moved) return;  // swipe이지 tap이 아님
    const dt = Date.now() - _tStart;
    if (dt > 500) return;  // long-press 무시
    const t = e.changedTouches[0];
    if (!t) return;

    const rect = cvs.getBoundingClientRect();
    // CSS 픽셀 단위 hit-test (zones와 동일 좌표계)
    const mx = t.clientX - rect.left;
    const my = t.clientY - rect.top;
    const hit = _hitTest(cvs, id, mx, my);

    // 동일 영역 두 번째 탭 → 닫기
    const isSecondTap = _activeTooltipCvs === cvs &&
                        _activeTooltipIdx &&
                        hit &&
                        _activeTooltipIdx.kind === hit.kind &&
                        _activeTooltipIdx.idx === hit.idx;

    if (isSecondTap || !hit) {
      _ttHide();
      _restoreSnap(cvs, id);
      _activeTooltipCvs = null;
      _activeTooltipIdx = null;
      return;
    }

    // 다른 canvas의 탭이라면 이전 캔버스 하이라이트 해제
    if (_activeTooltipCvs && _activeTooltipCvs !== cvs) {
      _restoreSnap(_activeTooltipCvs, _activeTooltipCvs.id);
    }

    // 새 영역 → 툴팁 표시 + 하이라이트
    if (hit.kind === 'pie') _drawPieHighlight(cvs, id, hit.idx);
    else _drawBarHighlight(cvs, id, hit.idx);
    cvs._prevBar = hit.idx;

    // 툴팁 위치는 화면 중앙 상단(차트 위쪽)에 고정 — 손가락에 가려지지 않도록
    _ttShow({clientX: t.clientX, clientY: t.clientY, mobile: true, cvsRect: rect}, hit.html);
    _activeTooltipCvs = cvs;
    _activeTooltipIdx = {kind: hit.kind, idx: hit.idx};
  }, {passive: true});
}

function _ttShow(e, html) {
  // close 버튼은 터치 환경 전용 (CSS가 hover:none에서만 보임)
  _tt.innerHTML = `<span class="tt-close" id="ttClose">×</span>${html}`;
  _tt.classList.add('vis');
  const tw = _tt.offsetWidth, th = _tt.offsetHeight;

  // 모바일 탭: 차트 위쪽 또는 아래쪽 안전한 위치 (손가락 회피)
  if (e.mobile && e.cvsRect) {
    const cx = e.cvsRect.left + e.cvsRect.width / 2;
    let lx = cx - tw / 2;
    let ly = e.cvsRect.top - th - 10;  // 차트 위
    // 차트 위에 공간이 부족하면 차트 아래
    if (ly < 8) ly = e.cvsRect.bottom + 10;
    // 화면 가로 경계 보정
    if (lx < 8) lx = 8;
    if (lx + tw > window.innerWidth - 8) lx = window.innerWidth - tw - 8;
    _tt.style.left = lx + 'px';
    _tt.style.top  = ly + 'px';
    return;
  }

  // 데스크탑: 마우스 옆에 표시
  let lx = e.clientX + 14, ly = e.clientY - 10;
  if (lx + tw > window.innerWidth - 8)  lx = e.clientX - tw - 14;
  if (ly + th > window.innerHeight - 8) ly = window.innerHeight - th - 8;
  _tt.style.left = lx + 'px'; _tt.style.top = ly + 'px';
}
function _ttHide() {
  _tt.classList.remove('vis');
  _activeTooltipCvs = null;
  _activeTooltipIdx = null;
}

// ─── 전역: outside tap → 툴팁 닫기 ───
document.addEventListener('touchstart', e => {
  if (!IS_TOUCH) return;
  if (!_activeTooltipCvs) return;
  const target = e.target;
  // 활성 캔버스 위 탭 → 캔버스의 touchend가 처리
  if (target === _activeTooltipCvs) return;
  // 툴팁 내부 탭(close 버튼 포함) → click 이벤트가 처리
  if (target && target.closest && target.closest('.chart-tooltip')) return;
  // 그 외 영역 탭 → 즉시 닫기
  if (_activeTooltipCvs) _restoreSnap(_activeTooltipCvs, _activeTooltipCvs.id);
  _ttHide();
}, {passive: true});

// close 버튼 클릭 (위임)
document.addEventListener('click', e => {
  const close = e.target.closest && e.target.closest('#ttClose');
  if (!close) return;
  if (_activeTooltipCvs) _restoreSnap(_activeTooltipCvs, _activeTooltipCvs.id);
  _ttHide();
  e.stopPropagation();
});

// ── 라인 차트 (월별 재산 추이) ─────────────────────────
function renderWealthTrend() {
  const ctx = setupCanvas('wealthTrendChart');
  const W = ctx.canvas._cssW, H = ctx.canvas._cssH;
  const PAD = {top:20, right:20, bottom:36, left:62};
  const sortedData = sortByMonth(DATA);
  const values = sortedData.map(d => d.total_wealth);
  const labels = sortedData.map(d => d.month);
  const minV = Math.min(...values) * 0.9;
  const maxV = Math.max(...values) * 1.08;
  const toX = i => PAD.left + i * (W - PAD.left - PAD.right) / (values.length - 1);
  const toY = v => PAD.top + (1 - (v - minV) / (maxV - minV)) * (H - PAD.top - PAD.bottom);

  ctx.clearRect(0, 0, W, H);

  // 가로 격자
  ctx.strokeStyle = '#1a2c22'; ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = PAD.top + i * (H - PAD.top - PAD.bottom) / 4;
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
    const val = maxV - i * (maxV - minV) / 4;
    ctx.fillStyle = '#666'; ctx.font = '11px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText('$' + (val/1000).toFixed(0) + 'K', PAD.left - 6, y + 4);
  }

  // 채운 영역
  ctx.beginPath();
  ctx.moveTo(toX(0), H - PAD.bottom);
  values.forEach((v, i) => ctx.lineTo(toX(i), toY(v)));
  ctx.lineTo(toX(values.length - 1), H - PAD.bottom);
  ctx.closePath();
  ctx.fillStyle = 'rgba(16,185,129,0.10)'; ctx.fill();

  // 라인
  ctx.beginPath();
  ctx.strokeStyle = WEALTH_COL; ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  values.forEach((v, i) => i === 0 ? ctx.moveTo(toX(i), toY(v)) : ctx.lineTo(toX(i), toY(v)));
  ctx.stroke();

  // 점 + 레이블
  const slotW = (W - PAD.left - PAD.right) / Math.max(values.length - 1, 1);
  const zones = [];
  const activeMonthStr = DATA[currentMonth]?.month;
  const activeIdx = sortedData.findIndex(d => d.month === activeMonthStr);
  values.forEach((v, i) => {
    const x = toX(i), y = toY(v);
    const isActive = i === activeIdx;
    ctx.beginPath();
    ctx.arc(x, y, isActive ? 6 : 4, 0, Math.PI * 2);
    ctx.fillStyle = isActive ? '#fff' : WEALTH_COL;
    ctx.strokeStyle = WEALTH_COL; ctx.lineWidth = 2;
    ctx.fill(); ctx.stroke();
    if (isActive) {
      ctx.fillStyle = '#e4e4f0'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('$' + (v/1000).toFixed(0) + 'K', x, y - 12);
    }
    ctx.fillStyle = '#888'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(labels[i], x, H - PAD.bottom + 18);
    zones.push({x: x - slotW/2, y: 0, w: slotW, h: H,
      html: _ttHtml(labels[i], [{label:'총재산', val:fmt(v), color:WEALTH_COL}])});
  });
  _setHz('wealthTrendChart', zones);
  _ttSetup('wealthTrendChart');
  _saveSnap('wealthTrendChart');
}

// ── 바 차트 (수입 vs 지출 — chronological order) ──────
function renderIncomeExpense() {
  const ctx = setupCanvas('incomeExpenseChart');
  const W = ctx.canvas._cssW, H = ctx.canvas._cssH;
  const PAD = {top:24, right:20, bottom:36, left:62};
  // 월 순서대로 정렬 (locale/date format 차이로 깨지지 않도록 parseMonth 사용)
  const sorted = sortByMonth(DATA);
  const n = sorted.length;
  const maxV = Math.max(...sorted.map(d => Math.max(d.income, d.living_expense))) * 1.1;
  const slotW = (W - PAD.left - PAD.right) / n;
  const barW = slotW * 0.3;

  ctx.clearRect(0, 0, W, H);

  // 격자
  ctx.strokeStyle = '#1a2c22'; ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = PAD.top + i * (H - PAD.top - PAD.bottom) / 4;
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
    const val = maxV * (1 - i / 4);
    ctx.fillStyle = '#666'; ctx.font = '11px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText('$' + (val/1000).toFixed(0) + 'K', PAD.left - 6, y + 4);
  }

  const toY = v => PAD.top + (1 - v / maxV) * (H - PAD.top - PAD.bottom);
  const bH  = v => (v / maxV) * (H - PAD.top - PAD.bottom);

  const zones2 = [];
  sorted.forEach((d, i) => {
    const cx = PAD.left + i * slotW + slotW / 2;
    const iy = toY(d.income), ih = bH(d.income);
    ctx.fillStyle = 'rgba(16,185,129,0.75)';
    ctx.beginPath();
    ctx.roundRect(cx - barW - 2, iy, barW, ih, [4,4,0,0]);
    ctx.fill();
    const ey = toY(d.living_expense), eh = bH(d.living_expense);
    ctx.fillStyle = 'rgba(248,113,113,0.75)';
    ctx.beginPath();
    ctx.roundRect(cx + 2, ey, barW, eh, [4,4,0,0]);
    ctx.fill();
    ctx.fillStyle = '#888'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(d.month, cx, H - PAD.bottom + 18);
    const net = d.income - d.living_expense;
    zones2.push({x: cx - slotW/2, y: 0, w: slotW, h: H,
      html: _ttHtml(d.month, [
        {label:'수입', val:fmt(d.income), color:INCOME_COL},
        {label:'생활지출', val:fmt(d.living_expense), color:EXPENSE_COL},
        {label:'순저축', val:fmt(net), color:net>=0?SAVINGS_COL:'#fb923c'}
      ])});
  });

  const items = [['수입', INCOME_COL], ['생활지출', EXPENSE_COL]];
  items.forEach(([label, color], i) => {
    const lx = PAD.left + i * 80;
    ctx.fillStyle = color; ctx.fillRect(lx, 4, 12, 12);
    ctx.fillStyle = '#aaa'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(label, lx + 16, 14);
  });
  _setHz('incomeExpenseChart', zones2);
  _ttSetup('incomeExpenseChart');
  _saveSnap('incomeExpenseChart');
}

// ── 도넛 차트 (카테고리 구성) ────
function renderPie(idx) {
  const d = idx === -1 ? TOTAL : DATA[idx];
  const cats = Object.entries(d.categories)
    .filter(([k, v]) => v > 0 && k !== '저축/투자')
    .sort((a, b) => b[1] - a[1]);
  const total = cats.reduce((s,[,v]) => s + v, 0);
  const ctx = setupCanvas('categoryPieChart');
  const W = ctx.canvas._cssW, H = ctx.canvas._cssH;

  ctx.clearRect(0, 0, W, H);

  const legendW = 130;
  const chartArea = W - legendW;
  const cx = chartArea / 2, cy = H / 2;
  const outerR = Math.min(cx, cy) - 12;
  const innerR = outerR * 0.62;

  const pieSlices = [];
  const pieAngles = [];
  let startAngle = -Math.PI / 2;
  cats.forEach(([k, v]) => {
    const sweep = (v / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, outerR, startAngle, startAngle + sweep);
    ctx.closePath();
    ctx.fillStyle = CAT_COLORS[k] || '#888';
    ctx.fill();
    ctx.strokeStyle = '#16161f'; ctx.lineWidth = 2;
    ctx.stroke();
    pieAngles.push({ rawStart: startAngle, sweep, color: CAT_COLORS[k] || '#888' });
    pieSlices.push({
      s: _normAngle(startAngle + Math.PI/2),
      e: _normAngle(startAngle + sweep + Math.PI/2),
      html: _ttHtml(k, [
        {label:'금액', val:fmt(v), color:CAT_COLORS[k]||'#888'},
        {label:'비중', val:((v/total)*100).toFixed(1)+'%', color:'#aaa'}
      ])
    });
    startAngle += sweep;
  });
  _pieAngles['categoryPieChart'] = pieAngles;

  ctx.beginPath();
  ctx.arc(cx, cy, innerR, 0, Math.PI * 2);
  ctx.fillStyle = '#121a14'; ctx.fill();

  ctx.fillStyle = '#888'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('총 지출', cx, cy - 8);
  ctx.fillStyle = '#e4e4f0'; ctx.font = 'bold 13px sans-serif';
  ctx.fillText(fmt(total), cx, cy + 10);

  const itemH = 18;
  const legendX = chartArea + 8;
  const startY = Math.max(8, (H - cats.length * itemH) / 2);
  cats.forEach(([k, v], i) => {
    const y = startY + i * itemH;
    ctx.fillStyle = CAT_COLORS[k] || '#888';
    ctx.fillRect(legendX, y + 2, 10, 10);
    ctx.fillStyle = '#aaa'; ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
    const pct = ((v / total) * 100).toFixed(0);
    ctx.fillText(`${k} ${pct}%`, legendX + 14, y + 11);
  });
  _setPz('categoryPieChart', {cx, cy, outerR, innerR, slices: pieSlices});
  _ttSetup('categoryPieChart');
  _saveSnap('categoryPieChart');
}

const TOTAL = {
  month: '전체',
  total_wealth: DATA[DATA.length - 1].total_wealth,
  bank_balance: DATA[DATA.length - 1].bank_balance,
  savings: DATA[DATA.length - 1].savings,
  stocks: DATA[DATA.length - 1].stocks,
  income: DATA.reduce((s, d) => s + d.income, 0),
  total_expense: DATA.reduce((s, d) => s + d.total_expense, 0),
  living_expense: DATA.reduce((s, d) => s + d.living_expense, 0),
  savings_net: DATA.reduce((s, d) => s + d.savings_net, 0),
  categories: (() => {
    const merged = {};
    DATA.forEach(d => {
      Object.entries(d.categories).forEach(([k, v]) => {
        merged[k] = (merged[k] || 0) + v;
      });
    });
    return merged;
  })(),
  accounts: (() => {
    const map = {};
    DATA.forEach(d => {
      d.accounts.forEach(a => {
        if (!map[a.name]) map[a.name] = { name: a.name, balance: 0, income: 0, expense: 0 };
        map[a.name].income += a.income;
        map[a.name].expense += a.expense;
      });
    });
    DATA[DATA.length - 1].accounts.forEach(a => {
      if (map[a.name]) map[a.name].balance = a.balance;
    });
    return Object.values(map);
  })(),
  fixed_tx: DATA.flatMap(d => d.fixed_tx),
};

// ── 전체 뷰: 월별 콤보 차트 ──
function renderAllMonthBar() {
  const ctx = setupCanvas('allMonthBarChart');
  const W = ctx.canvas._cssW, H = ctx.canvas._cssH;
  const PAD = {top:36, right:24, bottom:36, left:62};
  const sortedData = sortByMonth(DATA);
  const n = sortedData.length;
  const maxV = Math.max(...sortedData.map(d => Math.max(d.income, d.living_expense))) * 1.15;
  const slotW = (W - PAD.left - PAD.right) / n;
  const barW  = Math.min(slotW * 0.55, 44);
  const chartH = H - PAD.top - PAD.bottom;

  ctx.clearRect(0, 0, W, H);

  const toY = v => PAD.top + (1 - Math.max(0,v) / maxV) * chartH;
  const bH  = v => Math.max(0,v) / maxV * chartH;

  ctx.strokeStyle = '#1a2c22'; ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = PAD.top + i * chartH / 4;
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
    ctx.fillStyle = '#555'; ctx.font = '11px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText('$' + (maxV*(1-i/4)/1000).toFixed(0)+'K', PAD.left-6, y+4);
  }

  const zones3 = [];
  sortedData.forEach((d, i) => {
    const cx = PAD.left + i * slotW + slotW/2;
    const net = d.income - d.living_expense;
    const baseY = H - PAD.bottom;

    if (net >= 0) {
      const eh = bH(d.living_expense);
      ctx.fillStyle = 'rgba(248,113,113,0.82)';
      ctx.beginPath(); ctx.roundRect(cx - barW/2, baseY - eh, barW, eh, [0,0,0,0]); ctx.fill();
      const sh = bH(net);
      ctx.fillStyle = 'rgba(52,211,153,0.75)';
      ctx.beginPath(); ctx.roundRect(cx - barW/2, baseY - eh - sh, barW, sh, [4,4,0,0]); ctx.fill();
    } else {
      const eh = bH(d.living_expense);
      ctx.fillStyle = 'rgba(248,113,113,0.85)';
      ctx.beginPath(); ctx.roundRect(cx - barW/2, baseY - eh, barW, eh, [4,4,0,0]); ctx.fill();
      const dh = bH(-net);
      ctx.fillStyle = 'rgba(251,146,60,0.45)';
      ctx.beginPath(); ctx.roundRect(cx - barW/2, toY(d.income) - dh, barW, dh, [4,4,0,0]); ctx.fill();
    }

    ctx.fillStyle = '#888'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(d.month, cx, H - PAD.bottom + 18);

    zones3.push({x: cx - slotW/2, y: 0, w: slotW, h: H,
      html: _ttHtml(d.month, [
        {label:'수입', val:fmt(d.income), color:INCOME_COL},
        {label:'생활지출', val:fmt(d.living_expense), color:EXPENSE_COL},
        {label:'저축유입', val:fmt(d.savings_net), color:d.savings_net>=0?SAVINGS_COL:'#fb923c'}
      ])
    });
  });

  const incomePoints = sortedData.map((d, i) => ({
    x: PAD.left + i * slotW + slotW/2,
    y: toY(d.income)
  }));
  ctx.shadowColor = 'rgba(16,185,129,0.4)'; ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.strokeStyle = INCOME_COL; ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.setLineDash([]);
  incomePoints.forEach((p, i) => i===0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
  ctx.stroke();
  ctx.shadowBlur = 0;
  incomePoints.forEach(p => {
    ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
    ctx.fillStyle = INCOME_COL; ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
    ctx.fill(); ctx.stroke();
  });

  const leg = [['생활지출', EXPENSE_COL], ['순저축', SAVINGS_COL], ['수입 (선)', INCOME_COL]];
  leg.forEach(([lbl,col], i) => {
    const lx = PAD.left + i * 90;
    if (i === 2) {
      ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.beginPath();
      ctx.moveTo(lx, 10); ctx.lineTo(lx+16, 10); ctx.stroke();
    } else {
      ctx.fillStyle = col; ctx.fillRect(lx, 4, 14, 12);
    }
    ctx.fillStyle = '#aaa'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(lbl, lx + 20, 14);
  });

  _setHz('allMonthBarChart', zones3);
  _ttSetup('allMonthBarChart');
  _saveSnap('allMonthBarChart');
}

function renderAllIncomeExpense() {
  document.getElementById('incomeChartTitle').textContent = '대분류별 지출 비중 (전체)';
  const ctx = setupCanvas('incomeExpenseChart');
  const W = ctx.canvas._cssW, H = ctx.canvas._cssH;
  const PAD = {top:16, right:16, bottom:60, left:62};

  const cats = Object.entries(TOTAL.categories)
    .filter(([k, v]) => v > 0 && k !== '저축/투자')
    .sort((a,b) => b[1]-a[1])
    .slice(0, 8);
  const maxV = cats[0][1] * 1.1;

  ctx.clearRect(0, 0, W, H);
  const slotW = (W - PAD.left - PAD.right) / cats.length;
  const barW = Math.min(slotW * 0.55, 40);

  const zones4 = [];
  cats.forEach(([k, v], i) => {
    const cx = PAD.left + i * slotW + slotW / 2;
    const bh = (v / maxV) * (H - PAD.top - PAD.bottom);
    const by = H - PAD.bottom - bh;
    ctx.fillStyle = CAT_COLORS[k] || '#888';
    ctx.beginPath(); ctx.roundRect(cx - barW/2, by, barW, bh, [4,4,0,0]); ctx.fill();
    ctx.fillStyle = '#aaa'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('$'+(v/1000).toFixed(1)+'K', cx, by - 4);
    ctx.save();
    ctx.translate(cx, H - PAD.bottom + 6);
    ctx.rotate(-Math.PI / 5);
    ctx.fillStyle = '#888'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(k, 0, 0);
    ctx.restore();
    zones4.push({x: cx - slotW/2, y: by - 8, w: slotW, h: bh + 8,
      html: _ttHtml(k, [{label:'누적 지출', val:fmt(v), color:CAT_COLORS[k]||'#888'}])});
  });
  _setHz('incomeExpenseChart', zones4);
  _ttSetup('incomeExpenseChart');
  _saveSnap('incomeExpenseChart');
}

// ─── 모바일 swipe deck 시스템 ──────────────────────────
function _isMobile() {
  return window.matchMedia && window.matchMedia('(max-width: 768px)').matches;
}

let _dotScrollRaf = 0;
let _dotScrollHandler = null;

function _visibleDeckCards() {
  const deck = document.getElementById('cardsDeck');
  if (!deck) return [];
  return Array.from(deck.querySelectorAll('.chart-card, .table-card'))
    .filter(c => c.offsetParent !== null && c.offsetWidth > 0);
}

let _lastDeckHeightCard = null;
function _adjustDeckHeight(card) {
  const deck = document.getElementById('cardsDeck');
  if (!deck) return;
  if (!_isMobile()) {
    deck.style.height = '';
    _lastDeckHeightCard = null;
    return;
  }
  if (!card || _lastDeckHeightCard === card) return;
  _lastDeckHeightCard = card;
  deck.style.height = card.offsetHeight + 'px';
}

function rebuildSwipeDots() {
  const dotBox = document.getElementById('swipeDots');
  const label  = document.getElementById('swipePageLabel');
  const deck   = document.getElementById('cardsDeck');
  if (!dotBox || !deck) return;

  if (!_isMobile()) {
    dotBox.innerHTML = '';
    if (label) label.textContent = '';
    deck.style.height = '';
    _lastDeckHeightCard = null;
    return;
  }

  const cards = _visibleDeckCards();
  if (cards.length === 0) { dotBox.innerHTML = ''; return; }

  dotBox.innerHTML = cards.map((_, i) =>
    `<span class="swipe-dot${i === 0 ? ' active' : ''}" data-idx="${i}"></span>`
  ).join('');

  dotBox.querySelectorAll('.swipe-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      const i = parseInt(dot.dataset.idx, 10);
      const card = cards[i];
      if (!card) return;
      const left = card.offsetLeft - (deck.clientWidth - card.offsetWidth) / 2;
      deck.scrollTo({left, behavior: 'smooth'});
    });
  });

  if (label) label.textContent = cards[0]?.dataset.pageLabel || '';
  _lastDeckHeightCard = null;
  _adjustDeckHeight(cards[0]);

  const updateActive = () => {
    const deckCenter = deck.scrollLeft + deck.clientWidth / 2;
    let closestIdx = 0, closestDist = Infinity;
    cards.forEach((c, i) => {
      const cardCenter = c.offsetLeft + c.offsetWidth / 2;
      const dist = Math.abs(cardCenter - deckCenter);
      if (dist < closestDist) { closestDist = dist; closestIdx = i; }
    });
    const dots = dotBox.children;
    let changed = false;
    for (let i = 0; i < dots.length; i++) {
      const want = i === closestIdx;
      if (dots[i].classList.contains('active') !== want) {
        dots[i].classList.toggle('active', want);
        changed = true;
      }
    }
    if (changed) {
      if (label) label.textContent = cards[closestIdx]?.dataset.pageLabel || '';
      _adjustDeckHeight(cards[closestIdx]);
    }
  };

  if (_dotScrollHandler) deck.removeEventListener('scroll', _dotScrollHandler);
  _dotScrollHandler = () => {
    cancelAnimationFrame(_dotScrollRaf);
    _dotScrollRaf = requestAnimationFrame(updateActive);
  };
  deck.addEventListener('scroll', _dotScrollHandler, {passive: true});
  updateActive();
}

// ─── 리사이즈 / 오리엔테이션 변경 → 차트 재렌더 ───
let _resizeRaf = 0;
function _onResize() {
  cancelAnimationFrame(_resizeRaf);
  _resizeRaf = requestAnimationFrame(() => {
    const deck = document.getElementById('cardsDeck');
    if (deck && !_isMobile()) { deck.style.height = ''; _lastDeckHeightCard = null; }
    const allBar = document.getElementById('allMonthBarWrap');
    const isAllNow = allBar && allBar.style.display !== 'none';
    gotoMonth(isAllNow ? -1 : currentMonth);
  });
}
window.addEventListener('resize', _onResize);
window.addEventListener('orientationchange', _onResize);

// ─── 데스크탑 휠 → 가로 스크롤 ───
function _setupDeckWheel() {
  const deck = document.getElementById('cardsDeck');
  if (!deck) return;
  deck.addEventListener('wheel', e => {
    if (!_isMobile()) return;
    if (Math.abs(e.deltaX) >= Math.abs(e.deltaY)) return;
    deck.scrollLeft += e.deltaY;
    e.preventDefault();
  }, {passive: false});
}

document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('[data-month]');
  if (tab) gotoMonth(parseInt(tab.dataset.month));
});
document.getElementById('tabFixed').addEventListener('click', () => switchTxTab('fixed'));
document.getElementById('tabVar').addEventListener('click',   () => switchTxTab('var'));
document.addEventListener('DOMContentLoaded', () => {
  _setupDeckWheel();
  gotoMonth(currentMonth);
});
</script>
</html>
